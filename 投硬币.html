<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丢硬币 - 连续十正</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  user-select: none;
}

.game {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  position: relative;
  width: 100%;
  max-width: 420px;
  padding: 20px;
}

/* Game Goal */
.game-goal {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  letter-spacing: 2px;
}

/* Stats Bar */
.stats {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 12px 20px;
  background: rgba(255,255,255,0.06);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 15px;
}

.stat-label { color: rgba(255,255,255,0.5); font-size: 12px; }
.stat-value { font-weight: 700; font-size: 18px; }
.gold-value { color: #ffd700; }
.prob-value { color: #7dd3fc; }

/* Streak Dots */
.streak-section { text-align: center; width: 100%; }
.streak-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
.streak-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
}

.dot.active {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border-color: #ffd700;
  box-shadow: 0 0 12px rgba(255,215,0,0.5);
  color: #5a3e00;
  font-weight: 700;
  transform: scale(1.1);
}

.dot.active-new {
  animation: dotPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes dotPop {
  0% { transform: scale(0.3); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1.1); }
}

/* Coin Area */
.coin-area {
  perspective: 800px;
  width: 180px;
  height: 180px;
  margin: 16px 0;
}

.coin {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transform: rotateX(0deg);
}

.coin-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  font-weight: 900;
}

.coin-front {
  background: radial-gradient(circle at 35% 35%, #ffe88a, #ffd700 40%, #c8a200 100%);
  color: #7a5c00;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.3);
  box-shadow:
    inset 0 -4px 8px rgba(0,0,0,0.2),
    inset 0 4px 8px rgba(255,255,255,0.3),
    0 8px 32px rgba(255,215,0,0.3);
  border: 4px solid #b8960f;
}

.coin-back {
  background: radial-gradient(circle at 35% 35%, #c0c0c0, #a0a0a0 40%, #707070 100%);
  color: #404040;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.2);
  box-shadow:
    inset 0 -4px 8px rgba(0,0,0,0.3),
    inset 0 4px 8px rgba(255,255,255,0.2),
    0 8px 32px rgba(0,0,0,0.2);
  border: 4px solid #606060;
  transform: rotateX(180deg);
}

/* Result Text */
.result-text {
  height: 32px;
  font-size: 18px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.3s;
}

.result-text.show { opacity: 1; }
.result-text.heads-result { color: #ffd700; }
.result-text.tails-result { color: #ff6b6b; }

/* Floating Text */
.float-text {
  position: fixed;
  font-weight: 700;
  font-size: 22px;
  pointer-events: none;
  z-index: 100;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.2); }
}

/* Buttons */
.flip-btn {
  width: 200px;
  padding: 16px 0;
  font-size: 20px;
  font-weight: 700;
  font-family: inherit;
  color: #1a1a2e;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,215,0,0.3);
  position: relative;
  overflow: hidden;
}

.flip-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(255,215,0,0.45);
}

.flip-btn:active:not(:disabled) {
  transform: translateY(1px) scale(0.97);
  box-shadow: 0 2px 12px rgba(255,215,0,0.3);
}

.flip-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.shop-btn {
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  color: #fff;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(5px);
}

.shop-btn:hover {
  background: rgba(255,255,255,0.18);
  border-color: rgba(255,255,255,0.3);
}

/* Buff Indicators */
.buffs {
  display: flex;
  gap: 8px;
  min-height: 28px;
  flex-wrap: wrap;
  justify-content: center;
}

.buff-tag {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  animation: buffIn 0.3s ease-out;
}

@keyframes buffIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.buff-guaranteed {
  background: rgba(255,215,0,0.2);
  color: #ffd700;
  border: 1px solid rgba(255,215,0,0.3);
}

.buff-protection {
  background: rgba(0,200,150,0.2);
  color: #00dfa2;
  border: 1px solid rgba(0,200,150,0.3);
}

/* Shop Overlay */
.shop-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  opacity: 1;
  transition: opacity 0.3s;
}

.shop-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.shop-panel {
  background: linear-gradient(135deg, #1e1b3a, #2a2650);
  border-radius: 20px;
  padding: 28px 24px;
  width: 90%;
  max-width: 400px;
  max-height: 80vh;
  overflow-y: auto;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.shop-title {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
  color: #ffd700;
}

.shop-gold {
  text-align: center;
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 16px;
}

.shop-gold span { color: #ffd700; font-weight: 700; font-size: 18px; }

.shop-items { display: flex; flex-direction: column; gap: 10px; }

.shop-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.2s;
}

.shop-item:hover:not(.shop-item-disabled) {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.12);
}

.shop-item-disabled { opacity: 0.4; }

.item-info { flex: 1; }
.item-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.item-desc { font-size: 12px; color: rgba(255,255,255,0.45); }
.item-extra { font-size: 11px; color: rgba(255,215,0,0.6); margin-top: 2px; }

.buy-btn {
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  color: #1a1a2e;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  margin-left: 12px;
}

.buy-btn:hover:not(:disabled) { transform: scale(1.05); }
.buy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.close-btn {
  display: block;
  margin: 20px auto 0;
  padding: 10px 40px;
  font-size: 15px;
  font-family: inherit;
  color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
}

.close-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }

/* Win Overlay */
.win-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  opacity: 1;
  transition: opacity 0.5s;
}

.win-overlay.hidden { opacity: 0; pointer-events: none; }

.win-title {
  font-size: 48px;
  font-weight: 900;
  color: #ffd700;
  text-shadow: 0 0 40px rgba(255,215,0,0.5);
  margin-bottom: 12px;
  animation: winPulse 1.5s ease-in-out infinite;
}

@keyframes winPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.win-sub {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 32px;
}

.win-stats {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 28px;
  text-align: center;
  line-height: 1.8;
}

.restart-btn {
  padding: 14px 40px;
  font-size: 18px;
  font-weight: 700;
  font-family: inherit;
  color: #1a1a2e;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 20px rgba(255,215,0,0.3);
}

.restart-btn:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 6px 28px rgba(255,215,0,0.45);
}

/* Screen shake */
.shake { animation: shake 0.4s ease-out; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Confetti */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  z-index: 2001;
  pointer-events: none;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
}

/* Scrollbar */
.shop-panel::-webkit-scrollbar { width: 4px; }
.shop-panel::-webkit-scrollbar-track { background: transparent; }
.shop-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="game" id="game">
  <div class="game-goal">连续掷出 10 次正面即为胜利</div>

  <div class="stats">
    <div class="stat-item">
      <div>
        <div class="stat-label">金币</div>
        <div class="stat-value gold-value" id="goldDisplay">0</div>
      </div>
    </div>
    <div class="stat-item">
      <div>
        <div class="stat-label">正面率</div>
        <div class="stat-value prob-value" id="probDisplay">20%</div>
      </div>
    </div>
    <div class="stat-item">
      <div>
        <div class="stat-label">总投掷</div>
        <div class="stat-value" id="totalDisplay">0</div>
      </div>
    </div>
  </div>

  <div class="streak-section">
    <div class="streak-label">连续正面进度</div>
    <div class="streak-dots" id="streakDots"></div>
  </div>

  <div class="buffs" id="buffs"></div>

  <div class="coin-area">
    <div class="coin" id="coin">
      <div class="coin-face coin-front">正</div>
      <div class="coin-face coin-back">反</div>
    </div>
  </div>

  <div class="result-text" id="resultText"></div>

  <button class="flip-btn" id="flipBtn">投掷硬币</button>
  <button class="shop-btn" id="shopBtn">商店</button>
</div>

<div class="shop-overlay hidden" id="shopOverlay">
  <div class="shop-panel">
    <div class="shop-title">商店</div>
    <div class="shop-gold">持有 <span id="shopGold">0</span> 金币</div>
    <div class="shop-items" id="shopItems"></div>
    <button class="close-btn" id="closeShop">关闭</button>
  </div>
</div>

<div class="win-overlay hidden" id="winOverlay">
  <div class="win-title">你赢了！</div>
  <div class="win-sub">连续 10 次正面朝上</div>
  <div class="win-stats" id="winStats"></div>
  <button class="restart-btn" id="restartBtn">再来一局</button>
</div>

<script>
const state = {
  gold: 0,
  streak: 0,
  headsProb: 20,
  goldPerHeads: 5,
  animDuration: 1500,
  guaranteedHeads: false,
  protection: false,
  totalFlips: 0,
  flipping: false,
  lastRotation: 0,
  speedLevel: 0,
  probLevel: 0,
  goldLevel: 0,
};

const shopItemDefs = [
  {
    id: 'prob_up',
    name: '概率提升',
    desc: '正面概率 +5%',
    price: 30,
    type: 'permanent',
    maxLevel: 14,
    getExtra: () => `已购 ${state.probLevel} 次 (当前 ${state.headsProb}%)`,
    canBuy: () => state.probLevel < 14 && state.headsProb < 90,
    apply: () => { state.headsProb += 5; state.probLevel++; },
  },
  {
    id: 'speed_up',
    name: '加速投掷',
    desc: '动画速度 +10%',
    price: 30,
    type: 'permanent',
    maxLevel: 8,
    getExtra: () => `已购 ${state.speedLevel} 次`,
    canBuy: () => state.speedLevel < 8,
    apply: () => { state.animDuration *= 0.9; state.speedLevel++; },
  },
  {
    id: 'guaranteed',
    name: '必出正面',
    desc: '下一次投掷必定正面',
    price: 30,
    type: 'consumable',
    getExtra: () => state.guaranteedHeads ? '已激活' : '',
    canBuy: () => !state.guaranteedHeads,
    apply: () => { state.guaranteedHeads = true; },
  },
  {
    id: 'gold_up',
    name: '金币加成',
    desc: '每次正面额外 +2 金币',
    price: 25,
    type: 'permanent',
    maxLevel: 10,
    getExtra: () => `已购 ${state.goldLevel} 次 (每次正面 +${state.goldPerHeads})`,
    canBuy: () => state.goldLevel < 10,
    apply: () => { state.goldPerHeads += 2; state.goldLevel++; },
  },
  {
    id: 'protection',
    name: '失败保护',
    desc: '下次反面不会中断连击',
    price: 50,
    type: 'consumable',
    getExtra: () => state.protection ? '已激活' : '',
    canBuy: () => !state.protection,
    apply: () => { state.protection = true; },
  },
];

// DOM
const coinEl = document.getElementById('coin');
const flipBtn = document.getElementById('flipBtn');
const shopBtn = document.getElementById('shopBtn');
const shopOverlay = document.getElementById('shopOverlay');
const closeShopBtn = document.getElementById('closeShop');
const shopItemsEl = document.getElementById('shopItems');
const goldDisplay = document.getElementById('goldDisplay');
const probDisplay = document.getElementById('probDisplay');
const totalDisplay = document.getElementById('totalDisplay');
const shopGoldEl = document.getElementById('shopGold');
const streakDotsEl = document.getElementById('streakDots');
const resultText = document.getElementById('resultText');
const buffsEl = document.getElementById('buffs');
const winOverlay = document.getElementById('winOverlay');
const winStats = document.getElementById('winStats');
const restartBtn = document.getElementById('restartBtn');
const gameEl = document.getElementById('game');

// Init streak dots
function initDots() {
  streakDotsEl.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.textContent = i + 1;
    streakDotsEl.appendChild(dot);
  }
}
initDots();

function updateUI() {
  goldDisplay.textContent = state.gold;
  probDisplay.textContent = state.headsProb + '%';
  totalDisplay.textContent = state.totalFlips;

  const dots = streakDotsEl.children;
  for (let i = 0; i < 10; i++) {
    dots[i].classList.toggle('active', i < state.streak);
  }

  // Buffs
  let html = '';
  if (state.guaranteedHeads) html += '<span class="buff-tag buff-guaranteed">必出正面</span>';
  if (state.protection) html += '<span class="buff-tag buff-protection">失败保护</span>';
  buffsEl.innerHTML = html;
}

function showResult(isHeads) {
  resultText.className = 'result-text show ' + (isHeads ? 'heads-result' : 'tails-result');
  if (isHeads) {
    resultText.textContent = `正面！+${state.goldPerHeads} 金币`;
  } else if (state.protection) {
    resultText.textContent = '反面 — 保护生效，连击保留！';
  } else {
    resultText.textContent = state.streak > 0 ? `反面...连击 ${state.streak} 中断！` : '反面...';
  }
}

function spawnFloatText(text, color, x, y) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.color = color;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function flipCoin() {
  if (state.flipping) return;
  state.flipping = true;
  flipBtn.disabled = true;
  resultText.className = 'result-text';

  // Determine result
  let isHeads;
  if (state.guaranteedHeads) {
    isHeads = true;
    state.guaranteedHeads = false;
  } else {
    isHeads = Math.random() * 100 < state.headsProb;
  }

  state.totalFlips++;

  // Animation
  const startRot = state.lastRotation;
  const spins = 5;
  const desiredEnd = isHeads ? 0 : 180;
  const targetRot = spins * 360 + (desiredEnd - startRot % 360 + 360) % 360;

  const anim = coinEl.animate([
    { transform: `translateY(0px) rotateX(${startRot}deg)` },
    { transform: `translateY(-220px) rotateX(${startRot + targetRot * 0.45}deg)`, offset: 0.4 },
    { transform: `translateY(-220px) rotateX(${startRot + targetRot * 0.55}deg)`, offset: 0.55 },
    { transform: `translateY(0px) rotateX(${startRot + targetRot}deg)` },
  ], {
    duration: state.animDuration,
    easing: 'cubic-bezier(0.22, 0.61, 0.36, 1)',
    fill: 'forwards',
  });

  anim.onfinish = () => {
    anim.cancel();
    const finalRot = (startRot + targetRot) % 360;
    state.lastRotation = finalRot;
    coinEl.style.transform = `rotateX(${finalRot}deg)`;

    showResult(isHeads);

    if (isHeads) {
      state.gold += state.goldPerHeads;
      state.streak++;

      // Float text
      const rect = coinEl.getBoundingClientRect();
      spawnFloatText(`+${state.goldPerHeads}`, '#ffd700', rect.left + rect.width / 2 - 15, rect.top);

      // Animate new dot
      const dots = streakDotsEl.children;
      if (state.streak <= 10) {
        dots[state.streak - 1].classList.add('active-new');
        setTimeout(() => dots[state.streak - 1].classList.remove('active-new'), 500);
      }

      updateUI();

      // Win check
      if (state.streak >= 10) {
        setTimeout(() => showWin(), 600);
      }
    } else {
      if (state.protection) {
        state.protection = false;
        // Don't reset streak
      } else {
        state.streak = 0;
        gameEl.classList.add('shake');
        setTimeout(() => gameEl.classList.remove('shake'), 400);
      }
      updateUI();
    }

    state.flipping = false;
    flipBtn.disabled = false;
  };
}

// Shop
function renderShop() {
  shopGoldEl.textContent = state.gold;
  shopItemsEl.innerHTML = '';

  shopItemDefs.forEach(item => {
    const canAfford = state.gold >= item.price;
    const canBuy = item.canBuy() && canAfford;
    const div = document.createElement('div');
    div.className = 'shop-item' + (canBuy ? '' : ' shop-item-disabled');

    const extra = item.getExtra();
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        ${extra ? `<div class="item-extra">${extra}</div>` : ''}
      </div>
      <button class="buy-btn" ${canBuy ? '' : 'disabled'}>${item.price}g 购买</button>
    `;

    const btn = div.querySelector('.buy-btn');
    btn.addEventListener('click', () => {
      if (!item.canBuy() || state.gold < item.price) return;
      state.gold -= item.price;
      item.apply();
      updateUI();
      renderShop();
    });

    shopItemsEl.appendChild(div);
  });
}

shopBtn.addEventListener('click', () => {
  shopOverlay.classList.remove('hidden');
  renderShop();
});

closeShopBtn.addEventListener('click', () => {
  shopOverlay.classList.add('hidden');
});

shopOverlay.addEventListener('click', (e) => {
  if (e.target === shopOverlay) shopOverlay.classList.add('hidden');
});

flipBtn.addEventListener('click', flipCoin);

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !state.flipping && winOverlay.classList.contains('hidden') && shopOverlay.classList.contains('hidden')) {
    e.preventDefault();
    flipCoin();
  }
});

// Win
function showWin() {
  winStats.innerHTML = `总共投掷了 ${state.totalFlips} 次<br>剩余金币 ${state.gold}`;
  winOverlay.classList.remove('hidden');
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ffd700', '#ff6b6b', '#7dd3fc', '#00dfa2', '#c084fc', '#ff9f43'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    piece.style.animationDelay = (Math.random() * 1) + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

restartBtn.addEventListener('click', () => {
  state.gold = 0;
  state.streak = 0;
  state.headsProb = 20;
  state.goldPerHeads = 5;
  state.animDuration = 1500;
  state.guaranteedHeads = false;
  state.protection = false;
  state.totalFlips = 0;
  state.flipping = false;
  state.lastRotation = 0;
  state.speedLevel = 0;
  state.probLevel = 0;
  state.goldLevel = 0;
  coinEl.style.transform = 'rotateX(0deg)';
  resultText.className = 'result-text';
  winOverlay.classList.add('hidden');
  updateUI();
});

updateUI();
</script>
</body>
</html>
