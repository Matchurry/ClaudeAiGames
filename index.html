<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>田园物语</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

#app {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  max-width: 500px; margin: 0 auto;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Top Bar ── */
#top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; flex-shrink: 0;
  background: rgba(0,0,0,0.35);
}
#top-bar h1 {
  font-size: 17px;
  background: linear-gradient(90deg, #56ab2f, #a8e063);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#coin-display {
  font-size: 15px; font-weight: 700; color: #ffd700;
  display: flex; align-items: center; gap: 4px;
}
#total-display {
  font-size: 12px; color: rgba(255,255,255,0.45);
}

/* ── Status Bar ── */
#status-bar {
  display: flex; justify-content: space-around; align-items: center;
  padding: 4px 14px; font-size: 11px; color: rgba(255,255,255,0.5);
  background: rgba(0,0,0,0.2); flex-shrink: 0;
  gap: 12px;
}
#status-bar span { white-space: nowrap; }
.status-active { color: #a8e063 !important; font-weight: 600; }

/* ── Farm Grid ── */
#farm-area {
  flex: 1; overflow-y: auto; padding: 10px 8px;
  display: flex; align-items: flex-start; justify-content: center;
  -webkit-overflow-scrolling: touch;
}
#farm-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  width: 100%;
}

.plot {
  position: relative;
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  overflow: hidden;
  min-height: 80px;
}
.plot:active { transform: scale(0.94); }

.plot.empty {
  border-style: dashed;
  border-color: rgba(255,255,255,0.18);
}
.plot.empty:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

.plot.growing { border-color: rgba(168, 224, 99, 0.4); }
.plot.ready {
  border-color: #ffd700;
  background: rgba(255, 215, 0, 0.08);
  animation: plotGlow 1.2s ease-in-out infinite alternate;
}
@keyframes plotGlow {
  from { box-shadow: 0 0 6px rgba(255,215,0,0.3); }
  to   { box-shadow: 0 0 18px rgba(255,215,0,0.65); }
}

.plot-emoji {
  font-size: 32px; line-height: 1;
  transition: transform 0.3s;
}
.plot.growing .plot-emoji { animation: cropPulse 2.5s ease-in-out infinite; }
.plot.ready .plot-emoji   { animation: cropBounce 0.8s ease-in-out infinite alternate; }
@keyframes cropPulse {
  0%,100% { transform: scale(0.92); }
  50%     { transform: scale(1.04); }
}
@keyframes cropBounce {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-4px) scale(1.06); }
}

.plot-label {
  font-size: 9px; color: rgba(255,255,255,0.5);
  margin-top: 3px; text-align: center;
}
.plot.ready .plot-label { color: #ffd700; font-weight: 600; }

.plot-progress-wrap {
  position: absolute; bottom: 6px; left: 8px; right: 8px;
  height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px;
  overflow: hidden;
}
.plot-progress-bar {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #56ab2f, #a8e063);
  transition: width 0.5s linear;
}
.plot.ready .plot-progress-bar {
  background: linear-gradient(90deg, #ffd700, #ffaa00);
  width: 100% !important;
}

.plot-add-icon {
  font-size: 28px; color: rgba(255,255,255,0.25);
}

/* ── Bottom Bar ── */
#bottom-bar {
  display: flex; gap: 10px; padding: 8px 12px;
  background: rgba(0,0,0,0.35); flex-shrink: 0;
}
.bar-btn {
  flex: 1; padding: 12px 0; border: none; border-radius: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  font-family: inherit;
}
.bar-btn:active { transform: scale(0.95); }
#btn-shop {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  color: #fff;
}
#btn-shop:hover { background: rgba(255,255,255,0.16); }
#btn-harvest-all {
  background: linear-gradient(135deg, #56ab2f, #a8e063);
  color: #1a1a1a;
  box-shadow: 0 3px 14px rgba(86,171,47,0.35);
}
#btn-harvest-all:disabled { opacity: 0.4; cursor: default; }

/* ── Overlay base ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100;
  opacity: 1; transition: opacity 0.25s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.panel {
  background: linear-gradient(160deg, #1e1b3a, #2a2650);
  border-radius: 22px 22px 0 0;
  width: 100%; max-width: 500px;
  padding: 20px 18px 28px;
  max-height: 80vh; overflow-y: auto;
  border-top: 1px solid rgba(255,255,255,0.1);
  animation: slideUp 0.28s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes slideUp {
  from { transform: translateY(60px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.panel-title {
  text-align: center; font-size: 18px; font-weight: 700;
  margin-bottom: 16px; color: #a8e063;
}
.panel-close {
  display: block; margin: 16px auto 0;
  padding: 9px 36px; border: none; border-radius: 50px;
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
  font-size: 14px; font-family: inherit; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  transition: background 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

/* ── Seed Picker ── */
.seed-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.seed-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 12px 10px;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; gap: 10px;
}
.seed-card:hover:not(.locked) { background: rgba(255,255,255,0.1); border-color: rgba(168,224,99,0.5); }
.seed-card:active:not(.locked) { transform: scale(0.96); }
.seed-card.locked { opacity: 0.35; cursor: default; filter: grayscale(0.6); }
.seed-card.cant-afford { opacity: 0.5; cursor: default; }
.seed-emoji { font-size: 28px; }
.seed-info { flex: 1; }
.seed-name { font-size: 13px; font-weight: 700; }
.seed-cost { font-size: 11px; color: #ffd700; margin-top: 2px; }
.seed-time { font-size: 10px; color: rgba(255,255,255,0.4); }
.seed-yield { font-size: 10px; color: #a8e063; }
.seed-lock-label { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 2px; }

/* ── Shop ── */
.shop-items { display: flex; flex-direction: column; gap: 8px; }
.shop-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 12px 14px;
  transition: background 0.18s;
}
.shop-item:hover:not(.disabled) { background: rgba(255,255,255,0.08); }
.shop-item.disabled { opacity: 0.38; }
.shop-icon { font-size: 26px; }
.shop-info { flex: 1; }
.shop-name { font-size: 14px; font-weight: 700; }
.shop-desc { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.shop-extra { font-size: 10px; color: rgba(255,215,0,0.65); margin-top: 2px; }
.buy-btn {
  padding: 7px 14px; border: none; border-radius: 20px;
  background: linear-gradient(135deg, #56ab2f, #a8e063);
  color: #1a1a1a; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; font-family: inherit;
  transition: transform 0.15s;
}
.buy-btn:hover:not(:disabled) { transform: scale(1.05); }
.buy-btn:disabled { opacity: 0.38; cursor: default; }

/* ── Floating text ── */
.float-text {
  position: fixed; pointer-events: none; z-index: 300;
  font-size: 18px; font-weight: 800; color: #ffd700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.15); }
}

.particle {
  position: fixed; pointer-events: none; z-index: 250;
  border-radius: 50%;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: #fff;
  padding: 9px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600; z-index: 400;
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* ── Scrollbar ── */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
#farm-area::-webkit-scrollbar { width: 3px; }
#farm-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Unlock Badge ── */
.unlock-badge {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: linear-gradient(135deg, #56ab2f, #a8e063);
  color: #1a1a1a; border-radius: 20px;
  padding: 16px 28px; text-align: center;
  z-index: 500; pointer-events: none;
  font-weight: 700;
  animation: badgePop 2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes badgePop {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
  15%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
  25%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  75%  { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0.8); opacity: 0; }
}
</style>
</head>
<body>

<div id="app">
  <div id="top-bar">
    <h1>🌾 田园物语</h1>
    <div id="coin-display">💰 <span id="coins-val">20</span></div>
    <div id="total-display">总收益: <span id="total-val">0</span></div>
  </div>

  <div id="status-bar">
    <span id="speed-status">⚡ 速度: 正常</span>
    <span id="bonus-status">🪙 加成: 无</span>
    <span id="auto-status">🤖 自动: 关闭</span>
  </div>

  <div id="farm-area">
    <div id="farm-grid"></div>
  </div>

  <div id="bottom-bar">
    <button class="bar-btn" id="btn-shop">🛒 商店</button>
    <button class="bar-btn" id="btn-harvest-all" disabled>🌟 一键收获</button>
  </div>
</div>

<!-- Seed Picker Overlay -->
<div class="overlay hidden" id="seed-overlay">
  <div class="panel">
    <div class="panel-title">选择种子</div>
    <div class="seed-grid" id="seed-grid"></div>
    <button class="panel-close" id="seed-close">取消</button>
  </div>
</div>

<!-- Shop Overlay -->
<div class="overlay hidden" id="shop-overlay">
  <div class="panel">
    <div class="panel-title">🛒 商店</div>
    <div style="text-align:center;font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:14px">
      持有金币：<span id="shop-coins" style="color:#ffd700;font-weight:700">0</span>
    </div>
    <div class="shop-items" id="shop-items"></div>
    <button class="panel-close" id="shop-close">关闭</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════
//  CROPS DATA
// ═══════════════════════════════════════
const CROPS = [
  { emoji: '🌾', name: '小麦',  growSec: 10,  cost: 5,   yield: 15,  unlock: 0    },
  { emoji: '🥕', name: '胡萝卜', growSec: 30,  cost: 15,  yield: 50,  unlock: 0    },
  { emoji: '🍅', name: '番茄',  growSec: 60,  cost: 35,  yield: 120, unlock: 50   },
  { emoji: '🌽', name: '玉米',  growSec: 120, cost: 80,  yield: 280, unlock: 200  },
  { emoji: '🍓', name: '草莓',  growSec: 300, cost: 200, yield: 750, unlock: 800  },
  { emoji: '🌻', name: '向日葵', growSec: 600, cost: 500, yield: 2000,unlock: 3000 },
];

const PLOT_UNLOCK_COSTS = [50, 150, 400, 1000, 2200, 5000, 11000, 25000];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
const state = {
  coins: 20,
  totalEarned: 0,
  plots: [],      // { cropIdx: -1 | n, plantTime: null | ms }
  plotCount: 4,
  autoHarvest: false,
  speedLevel: 0,  // 0-8, each level -10% grow time
  coinLevel: 0,   // 0-5, each level +20% yield
};

// Which crop picker is targeting
let pickerPlotIdx = -1;

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function effectiveGrowMs(cropIdx) {
  const base = CROPS[cropIdx].growSec * 1000;
  return Math.round(base * Math.pow(0.9, state.speedLevel));
}

function effectiveYield(cropIdx) {
  const base = CROPS[cropIdx].yield;
  return Math.round(base * Math.pow(1.2, state.coinLevel));
}

function isCropUnlocked(cropIdx) {
  return state.totalEarned >= CROPS[cropIdx].unlock;
}

function hasReadyPlot() {
  return state.plots.some(p => {
    if (p.cropIdx < 0 || p.plantTime === null) return false;
    return Date.now() - p.plantTime >= effectiveGrowMs(p.cropIdx);
  });
}

function formatTime(ms) {
  const s = Math.ceil(ms / 1000);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), rs = s % 60;
  return m + 'm' + (rs ? rs + 's' : '');
}

// ═══════════════════════════════════════
//  INIT PLOTS
// ═══════════════════════════════════════
function initPlots() {
  state.plots = [];
  for (let i = 0; i < 12; i++) state.plots.push({ cropIdx: -1, plantTime: null });
}

// ═══════════════════════════════════════
//  RENDER GRID
// ═══════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('farm-grid');
  grid.innerHTML = '';

  for (let i = 0; i < state.plotCount; i++) {
    const p = state.plots[i];
    const div = document.createElement('div');
    div.className = 'plot';
    div.dataset.idx = i;

    if (p.cropIdx < 0) {
      // Empty
      div.classList.add('empty');
      div.innerHTML = `<span class="plot-add-icon">＋</span><span class="plot-label">点击种植</span>`;
    } else {
      const crop = CROPS[p.cropIdx];
      const growMs = effectiveGrowMs(p.cropIdx);
      const elapsed = Date.now() - p.plantTime;
      const ready = elapsed >= growMs;
      const pct = Math.min(1, elapsed / growMs);

      div.classList.add(ready ? 'ready' : 'growing');
      div.innerHTML = `
        <span class="plot-emoji">${crop.emoji}</span>
        <span class="plot-label">${ready ? '可收获！' : formatTime(growMs - elapsed)}</span>
        <div class="plot-progress-wrap">
          <div class="plot-progress-bar" style="width:${Math.round(pct*100)}%"></div>
        </div>`;
    }

    div.addEventListener('click', () => onPlotClick(i));
    grid.appendChild(div);
  }

  // "Unlock plot" button if there are more to unlock
  if (state.plotCount < 12) {
    const nextCost = PLOT_UNLOCK_COSTS[state.plotCount - 4] ?? 99999;
    const div = document.createElement('div');
    div.className = 'plot empty';
    div.style.borderStyle = 'dashed';
    div.style.opacity = '0.6';
    div.innerHTML = `<span class="plot-add-icon" style="font-size:20px">🔓</span><span class="plot-label" style="font-size:8px">解锁 💰${nextCost}</span>`;
    div.addEventListener('click', () => {
      if (state.coins >= nextCost) {
        state.coins -= nextCost;
        state.plotCount++;
        updateUI();
        renderGrid();
        showToast('🌱 新土地已解锁！');
      } else {
        showToast(`金币不足，需要 ${nextCost} 💰`);
      }
    });
    grid.appendChild(div);
  }

  updateHarvestAllBtn();
}

function updateHarvestAllBtn() {
  document.getElementById('btn-harvest-all').disabled = !hasReadyPlot();
}

// ═══════════════════════════════════════
//  PLOT CLICK
// ═══════════════════════════════════════
function onPlotClick(idx) {
  const p = state.plots[idx];
  if (p.cropIdx < 0) {
    // Open seed picker
    pickerPlotIdx = idx;
    openSeedPicker();
    return;
  }
  const growMs = effectiveGrowMs(p.cropIdx);
  const ready = Date.now() - p.plantTime >= growMs;
  if (ready) {
    harvest(idx);
  } else {
    const rem = growMs - (Date.now() - p.plantTime);
    showToast(`${CROPS[p.cropIdx].name} 还需 ${formatTime(rem)}`);
  }
}

// ═══════════════════════════════════════
//  PLANT & HARVEST
// ═══════════════════════════════════════
function plant(plotIdx, cropIdx) {
  if (state.coins < CROPS[cropIdx].cost) { showToast('金币不足！'); return; }
  state.coins -= CROPS[cropIdx].cost;
  state.plots[plotIdx] = { cropIdx, plantTime: Date.now() };
  closeSeedPicker();
  renderGrid();
  updateUI();
}

function harvest(plotIdx) {
  const p = state.plots[plotIdx];
  if (p.cropIdx < 0) return;
  const growMs = effectiveGrowMs(p.cropIdx);
  if (Date.now() - p.plantTime < growMs) return;

  const earned = effectiveYield(p.cropIdx);
  state.coins += earned;
  state.totalEarned += earned;
  state.plots[plotIdx] = { cropIdx: -1, plantTime: null };

  // FX
  const plotEl = document.querySelector(`.plot[data-idx="${plotIdx}"]`);
  if (plotEl) spawnHarvestFX(plotEl, earned);

  // Check crop unlocks
  checkUnlocks();

  renderGrid();
  updateUI();
}

function harvestAll() {
  let count = 0;
  for (let i = 0; i < state.plotCount; i++) {
    const p = state.plots[i];
    if (p.cropIdx < 0 || p.plantTime === null) continue;
    if (Date.now() - p.plantTime >= effectiveGrowMs(p.cropIdx)) {
      const earned = effectiveYield(p.cropIdx);
      state.coins += earned;
      state.totalEarned += earned;
      state.plots[i] = { cropIdx: -1, plantTime: null };
      count++;
    }
  }
  if (count > 0) {
    checkUnlocks();
    renderGrid();
    updateUI();
    showToast(`🌟 收获了 ${count} 块地的作物！`);
  }
}

// ═══════════════════════════════════════
//  UNLOCK CHECK
// ═══════════════════════════════════════
const prevUnlocked = new Set([0, 1]);
function checkUnlocks() {
  CROPS.forEach((c, i) => {
    if (!prevUnlocked.has(i) && state.totalEarned >= c.unlock) {
      prevUnlocked.add(i);
      showUnlockBadge(c.emoji, c.name);
    }
  });
}

function showUnlockBadge(emoji, name) {
  const el = document.createElement('div');
  el.className = 'unlock-badge';
  el.innerHTML = `<div style="font-size:32px">${emoji}</div><div style="font-size:15px;margin-top:4px">解锁：${name}！</div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// ═══════════════════════════════════════
//  SEED PICKER
// ═══════════════════════════════════════
function openSeedPicker() {
  const grid = document.getElementById('seed-grid');
  grid.innerHTML = '';
  CROPS.forEach((c, i) => {
    const unlocked = isCropUnlocked(i);
    const canAfford = state.coins >= c.cost;
    const div = document.createElement('div');
    div.className = 'seed-card' + (!unlocked ? ' locked' : !canAfford ? ' cant-afford' : '');
    div.innerHTML = `
      <span class="seed-emoji">${c.emoji}</span>
      <div class="seed-info">
        <div class="seed-name">${c.name}</div>
        <div class="seed-cost">💰 ${c.cost} 金币</div>
        <div class="seed-time">⏱ ${formatTime(effectiveGrowMs(i) )}</div>
        <div class="seed-yield">+${effectiveYield(i)} 收益</div>
        ${!unlocked ? `<div class="seed-lock-label">🔒 需总收益 ${c.unlock}</div>` : ''}
      </div>`;
    if (unlocked && canAfford) {
      div.addEventListener('click', () => plant(pickerPlotIdx, i));
    }
    grid.appendChild(div);
  });
  document.getElementById('seed-overlay').classList.remove('hidden');
}

function closeSeedPicker() {
  document.getElementById('seed-overlay').classList.add('hidden');
}

// ═══════════════════════════════════════
//  SHOP
// ═══════════════════════════════════════
const SHOP_DEFS = [
  {
    icon: '⚡',
    name: '加速生长',
    desc: '所有作物生长时间 -10%',
    getExtra: () => `已购 ${state.speedLevel}/8 次`,
    price: () => Math.round(100 * Math.pow(2, state.speedLevel)),
    canBuy: () => state.speedLevel < 8,
    apply: () => { state.speedLevel++; },
  },
  {
    icon: '🪙',
    name: '金币加成',
    desc: '所有收获金币 +20%',
    getExtra: () => `已购 ${state.coinLevel}/5 次`,
    price: () => Math.round(200 * Math.pow(2.2, state.coinLevel)),
    canBuy: () => state.coinLevel < 5,
    apply: () => { state.coinLevel++; },
  },
  {
    icon: '🤖',
    name: '自动收获',
    desc: '每15秒自动收割成熟作物',
    getExtra: () => state.autoHarvest ? '✅ 已激活' : '',
    price: () => 500,
    canBuy: () => !state.autoHarvest,
    apply: () => { state.autoHarvest = true; },
  },
];

function openShop() {
  document.getElementById('shop-coins').textContent = state.coins;
  const el = document.getElementById('shop-items');
  el.innerHTML = '';
  SHOP_DEFS.forEach(def => {
    const price = def.price();
    const can = def.canBuy() && state.coins >= price;
    const disabled = !def.canBuy();
    const div = document.createElement('div');
    div.className = 'shop-item' + (disabled ? ' disabled' : '');
    const extra = def.getExtra();
    div.innerHTML = `
      <span class="shop-icon">${def.icon}</span>
      <div class="shop-info">
        <div class="shop-name">${def.name}</div>
        <div class="shop-desc">${def.desc}</div>
        ${extra ? `<div class="shop-extra">${extra}</div>` : ''}
      </div>
      <button class="buy-btn" ${can ? '' : 'disabled'}>${disabled ? '已满' : price + 'g'}</button>`;
    div.querySelector('.buy-btn').addEventListener('click', () => {
      if (!def.canBuy() || state.coins < price) return;
      state.coins -= price;
      def.apply();
      updateUI();
      renderGrid();
      openShop(); // re-render shop
    });
    el.appendChild(div);
  });
  document.getElementById('shop-overlay').classList.remove('hidden');
}

function closeShop() {
  document.getElementById('shop-overlay').classList.add('hidden');
}

// ═══════════════════════════════════════
//  UI UPDATE
// ═══════════════════════════════════════
function updateUI() {
  document.getElementById('coins-val').textContent = state.coins;
  document.getElementById('total-val').textContent = state.totalEarned;

  const speedEl = document.getElementById('speed-status');
  if (state.speedLevel > 0) {
    const pct = Math.round((1 - Math.pow(0.9, state.speedLevel)) * 100);
    speedEl.textContent = `⚡ 速度: -${pct}%`;
    speedEl.classList.add('status-active');
  } else {
    speedEl.textContent = '⚡ 速度: 正常';
    speedEl.classList.remove('status-active');
  }

  const bonusEl = document.getElementById('bonus-status');
  if (state.coinLevel > 0) {
    const pct = Math.round((Math.pow(1.2, state.coinLevel) - 1) * 100);
    bonusEl.textContent = `🪙 加成: +${pct}%`;
    bonusEl.classList.add('status-active');
  } else {
    bonusEl.textContent = '🪙 加成: 无';
    bonusEl.classList.remove('status-active');
  }

  const autoEl = document.getElementById('auto-status');
  autoEl.textContent = state.autoHarvest ? '🤖 自动: 开启' : '🤖 自动: 关闭';
  autoEl.classList.toggle('status-active', state.autoHarvest);
}

// ═══════════════════════════════════════
//  EFFECTS
// ═══════════════════════════════════════
function spawnHarvestFX(el, coins) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  // Float text
  const ft = document.createElement('div');
  ft.className = 'float-text';
  ft.textContent = `+${coins}💰`;
  ft.style.left = (cx - 20) + 'px';
  ft.style.top = cy + 'px';
  document.body.appendChild(ft);
  setTimeout(() => ft.remove(), 1000);

  // Particles
  const colors = ['#ffd700', '#a8e063', '#56ab2f', '#fff', '#ffaa00'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.background = colors[i % colors.length];
    const s = 4 + Math.random() * 5;
    p.style.width = s + 'px'; p.style.height = s + 'px';
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    document.body.appendChild(p);
    const a = (Math.PI * 2 * i) / 10 + Math.random() * 0.4;
    const d = 20 + Math.random() * 35;
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`, opacity: 0 }
    ], { duration: 380, easing: 'ease-out' }).onfinish = () => p.remove();
  }
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════
//  TICK (every second)
// ═══════════════════════════════════════
let autoTimer = 0;
function tick() {
  // Update progress bars without full re-render
  for (let i = 0; i < state.plotCount; i++) {
    const p = state.plots[i];
    if (p.cropIdx < 0 || p.plantTime === null) continue;
    const growMs = effectiveGrowMs(p.cropIdx);
    const elapsed = Date.now() - p.plantTime;
    const ready = elapsed >= growMs;
    const pct = Math.min(1, elapsed / growMs);

    const plotEl = document.querySelector(`.plot[data-idx="${i}"]`);
    if (!plotEl) continue;

    if (ready && plotEl.classList.contains('growing')) {
      // Transition to ready state
      plotEl.classList.remove('growing');
      plotEl.classList.add('ready');
      const label = plotEl.querySelector('.plot-label');
      if (label) label.textContent = '可收获！';
    } else if (!ready) {
      const rem = growMs - elapsed;
      const label = plotEl.querySelector('.plot-label');
      if (label) label.textContent = formatTime(rem);
      const bar = plotEl.querySelector('.plot-progress-bar');
      if (bar) bar.style.width = Math.round(pct * 100) + '%';
    }
  }

  updateHarvestAllBtn();

  // Auto harvest
  if (state.autoHarvest) {
    autoTimer++;
    if (autoTimer >= 15) {
      autoTimer = 0;
      let any = false;
      for (let i = 0; i < state.plotCount; i++) {
        const p = state.plots[i];
        if (p.cropIdx < 0 || p.plantTime === null) continue;
        if (Date.now() - p.plantTime >= effectiveGrowMs(p.cropIdx)) {
          const earned = effectiveYield(p.cropIdx);
          state.coins += earned;
          state.totalEarned += earned;
          const plotEl = document.querySelector(`.plot[data-idx="${i}"]`);
          if (plotEl) spawnHarvestFX(plotEl, earned);
          state.plots[i] = { cropIdx: -1, plantTime: null };
          any = true;
        }
      }
      if (any) {
        checkUnlocks();
        renderGrid();
        updateUI();
      }
    }
  }
}

// ═══════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════
document.getElementById('btn-shop').addEventListener('click', openShop);
document.getElementById('btn-harvest-all').addEventListener('click', harvestAll);
document.getElementById('seed-close').addEventListener('click', closeSeedPicker);
document.getElementById('shop-close').addEventListener('click', closeShop);

document.getElementById('seed-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('seed-overlay')) closeSeedPicker();
});
document.getElementById('shop-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shop-overlay')) closeShop();
});

// ═══════════════════════════════════════
//  START
// ═══════════════════════════════════════
initPlots();
renderGrid();
updateUI();
setInterval(tick, 1000);
</script>
