<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>需求工厂</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #06040f; width: 100%; height: 100%; }
body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  background: transparent;
  color: #fff;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── Dual background layers ── */
#bg-day, #bg-night {
  position: fixed; inset: 0; z-index: -1;
  transition: opacity 5s ease;
  pointer-events: none;
}
#bg-day {
  opacity: 1;
  background:
    radial-gradient(ellipse at 75% 15%, rgba(139,60,220,0.25) 0%, transparent 55%),
    linear-gradient(135deg, #0f0c29, #302b63, #24243e);
}
#bg-night {
  opacity: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(30,80,180,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(10,30,80,0.15) 0%, transparent 45%),
    linear-gradient(135deg, #020408, #04091a, #080e20);
}
#app {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

/* ── Top Bar ── */
#top-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: rgba(0,0,0,0.4);
  flex-shrink: 0; flex-wrap: wrap;
  transition: background 5s ease;
}
body.night-mode #top-bar { background: rgba(0,5,20,0.55); }
#money-display { font-size: 16px; font-weight: 800; color: #ffd700; flex: 1; }
#money-display small { font-size: 10px; color: rgba(255,215,0,0.5); font-weight: 400; margin-left: 4px; }
#save-badge { font-size: 10px; color: rgba(255,255,255,0.3); opacity: 0; transition: opacity 0.5s; white-space: nowrap; }
.top-btn {
  padding: 6px 14px; border: none; border-radius: 20px;
  font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: transform 0.15s;
}
.top-btn:active { transform: scale(0.93); }
#btn-recruit { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; }
#btn-shop    { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.18); }

/* ── Scene ── */
#scene { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── PM Panel ── */
#pm-panel {
  width: 110px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px;
  background: rgba(0,0,0,0.2); border-right: 1px solid rgba(255,255,255,0.06);
  padding: 10px 6px;
  transition: background 5s ease;
}
body.night-mode #pm-panel { background: rgba(0,8,30,0.35); }
#pm-ring-wrap { position: relative; width: 72px; height: 72px; }
#pm-ring {
  width: 72px; height: 72px; border-radius: 50%;
  background: conic-gradient(#a855f7 0deg, rgba(255,255,255,0.08) 0deg);
  display: flex; align-items: center; justify-content: center;
}
#pm-ring::before {
  content: ''; position: absolute; inset: 5px; border-radius: 50%;
  background: #1a1535; z-index: 1;
}
#pm-char { position: relative; z-index: 2; font-size: 30px; line-height: 1; }
#pm-char.sending { animation: pmSend 0.3s ease-out; }
@keyframes pmSend {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.25) translateX(4px); }
  100% { transform: scale(1); }
}
#pm-speech {
  position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
  background: rgba(168,85,247,0.9); color: #fff; font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 10px; white-space: nowrap;
  opacity: 0; pointer-events: none; z-index: 10; transition: opacity 0.2s;
}
#pm-speech.show { opacity: 1; }

#pm-label { font-size: 13px; font-weight: 800; color: #c084fc; text-align: center; transition: color 5s ease; }
#pm-time  { font-size: 15px; font-weight: 800; color: #fde68a; text-align: center; letter-spacing: 0.05em; transition: color 5s ease; }
body.night-mode #pm-label { color: #60a5fa; }
body.night-mode #pm-time  { color: #93c5fd; }
#pm-sub   { font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; }

#pm-stats {
  width: 100%; background: rgba(255,255,255,0.04);
  border-radius: 8px; padding: 6px 8px;
}
.pm-stat-row {
  display: flex; justify-content: space-between;
  font-size: 9px; color: rgba(255,255,255,0.45); margin-bottom: 2px;
}
.pm-stat-row:last-child { margin-bottom: 0; }
.pm-stat-val { color: #a8e063; font-weight: 700; }
.pm-stat-val.purple { color: #c084fc; }

.pool-bar-track {
  height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px;
  overflow: hidden; margin: 2px 0 4px;
}
.pool-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, #a855f7, #c084fc);
  transition: width 0.4s;
}

/* ── Employee Area ── */
#emp-area {
  flex: 1; overflow-y: auto; padding: 8px 6px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px;
  align-content: start; -webkit-overflow-scrolling: touch;
}
#emp-area::-webkit-scrollbar { width: 3px; }
#emp-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.emp-slot-empty {
  border: 2px dashed rgba(255,255,255,0.12); border-radius: 12px;
  padding: 12px 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; color: rgba(255,255,255,0.2); font-size: 11px; min-height: 120px;
}
.emp-slot-empty .slot-icon { font-size: 20px; }

/* Employee Card */
.emp-card {
  border-radius: 12px; padding: 8px; position: relative;
  border: 2px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  transition: background 5s ease, border-color 5s ease;
  transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
  min-height: 120px; overflow: hidden;
}
.emp-card.rarity-R   { border-color: rgba(148,163,184,0.4); }
.emp-card.rarity-SR  { border-color: rgba(167,139,250,0.5); }
.emp-card.rarity-SSR { border-color: rgba(251,191,36,0.6); box-shadow: 0 0 10px rgba(251,191,36,0.15); }

.emp-card.state-focusing   { background: rgba(59,130,246,0.06); }
.emp-card.state-distracted { background: rgba(239,68,68,0.08); }
.emp-card.off-duty         { opacity: 0.45; filter: saturate(0.3); }
.emp-schedule { font-size: 8px; color: rgba(255,255,255,0.18); text-align: right; margin-top: 2px; }
.emp-card.is-zoned { animation: zonedPulse 2s ease-in-out infinite; }
@keyframes zonedPulse {
  0%, 100% { background: rgba(239,68,68,0.08); }
  50%       { background: rgba(239,68,68,0.18); }
}

.emp-card.req-received { animation: reqImpact 0.3s ease-out; }
@keyframes reqImpact {
  0%  { transform: scale(1); }
  40% { transform: scale(1.04); }
  100%{ transform: scale(1); }
}

.emp-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.emp-rarity { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 6px; flex-shrink: 0; }
.rarity-R   .emp-rarity { background: rgba(148,163,184,0.2); color: #94a3b8; }
.rarity-SR  .emp-rarity { background: rgba(167,139,250,0.2); color: #a78bfa; }
.rarity-SSR .emp-rarity { background: rgba(251,191,36,0.2);  color: #fbbf24; }
.emp-name  { font-size: 11px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emp-emoji { font-size: 18px; line-height: 1; flex-shrink: 0; }

/* Bars */
.bar-row { margin-bottom: 4px; }
.bar-label-row {
  display: flex; justify-content: space-between;
  font-size: 8px; color: rgba(255,255,255,0.35); margin-bottom: 2px;
}
.bar-track {
  height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden;
}
.bar-fill  { height: 100%; border-radius: 2px; transition: width 0.15s linear; }
.bar-work         { background: linear-gradient(90deg, #56ab2f, #a8e063); }
.bar-focus-active { background: linear-gradient(90deg, #3b82f6, #93c5fd); }
.bar-distract     { background: linear-gradient(90deg, #ef4444, #f87171); }

/* Stats */
.emp-stats {
  display: flex; justify-content: space-around;
  font-size: 8px; color: rgba(255,255,255,0.4); margin-top: 4px;
}
.emp-stat-item { text-align: center; }
.emp-stat-num  { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.75); display: block; }

/* Manage button */
.emp-manage-btn {
  background: none; border: none; color: rgba(255,255,255,0.2);
  font-size: 12px; cursor: pointer; padding: 0 2px; line-height: 1;
  transition: color 0.15s; flex-shrink: 0;
}
.emp-manage-btn:hover { color: rgba(255,255,255,0.6); }


/* Employee manage panel */
.emp-manage-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
}
.emp-manage-emoji { font-size: 42px; line-height: 1; }
.emp-manage-info  { flex: 1; }
.emp-manage-name  { font-size: 18px; font-weight: 800; }
.emp-manage-meta  { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 3px; }
.emp-manage-stats {
  display: flex; gap: 8px; margin-bottom: 18px;
}
.emp-manage-stat {
  flex: 1; background: rgba(255,255,255,0.05); border-radius: 10px;
  padding: 8px 6px; text-align: center;
}
.emp-manage-stat-num { font-size: 18px; font-weight: 800; display: block; }
.emp-manage-stat-lbl { font-size: 9px; color: rgba(255,255,255,0.35); margin-top: 2px; display: block; }
.emp-manage-section { margin-bottom: 14px; }
.emp-manage-section-title {
  font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 7px; font-weight: 700;
}
.emp-rename-row { display: flex; gap: 8px; }
.emp-rename-input {
  flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit;
  padding: 8px 12px; outline: none;
}
.emp-rename-input:focus { border-color: rgba(168,85,247,0.6); }
.emp-rename-btn {
  padding: 8px 16px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.emp-fire-btn {
  width: 100%; padding: 11px; border: none; border-radius: 12px;
  background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25);
  color: #f87171; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: background 0.2s, border-color 0.2s;
}
.emp-fire-btn.confirm {
  background: rgba(239,68,68,0.3); border-color: rgba(239,68,68,0.6); color: #fca5a5;
}

/* State badge */
.emp-state-badge {
  font-size: 8px; font-weight: 600; padding: 1px 6px; border-radius: 8px;
  display: inline-block; margin-top: 3px;
}
.state-idle        .emp-state-badge { background: rgba(74,222,128,0.15);  color: #4ade80; }
.state-focusing    .emp-state-badge { background: rgba(96,165,250,0.15);  color: #60a5fa; }
.state-distracted  .emp-state-badge { background: rgba(251,146,60,0.15);  color: #fb923c; }
.is-zoned          .emp-state-badge { background: rgba(239,68,68,0.2);    color: #f87171; }

body.night-mode .emp-card { background: rgba(10,30,80,0.12); border-color: rgba(96,165,250,0.12); }

/* ── Log Panel ── */
#log-panel {
  display: none; width: 190px; flex-shrink: 0;
  background: rgba(0,0,0,0.2); border-left: 1px solid rgba(255,255,255,0.06);
  transition: background 5s ease;
  flex-direction: column; overflow: hidden;
}
#log-title {
  font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
  padding: 8px 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0; letter-spacing: 0.05em;
}
#log-entries {
  flex: 1; overflow-y: auto; padding: 8px 8px 8px;
}
#log-entries::-webkit-scrollbar { width: 3px; }
#log-entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.log-placeholder { font-size: 10px; color: rgba(255,255,255,0.15); text-align: center; margin-top: 20px; line-height: 1.6; }
.log-entry { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.log-entry:last-child { border-bottom: none; }
.log-day      { font-size: 10px; font-weight: 800; color: #c084fc; margin-bottom: 4px; }
.log-line     { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 2px; line-height: 1.5; }
.log-entry-event { border-left: 2px solid rgba(253,230,138,0.25); padding-left: 6px; }
.log-day-ev      { font-size: 9px; color: rgba(253,230,138,0.45); margin-bottom: 3px; }
.log-event-title { font-size: 11px; font-weight: 700; color: rgba(253,230,138,0.9); margin-bottom: 2px; line-height: 1.3; }
.log-event-desc  { font-size: 10px; color: rgba(255,255,255,0.38); line-height: 1.4; }
@media (min-width: 860px)  { #log-panel { display: flex; width: 260px; } }
@media (min-width: 1200px) { #log-panel { width: 320px; } #log-title { font-size: 12px; padding: 10px 14px 8px; } .log-line { font-size: 12px; } .log-day { font-size: 12px; } .log-event-title { font-size: 12px; } .log-event-desc { font-size: 11px; } .log-day-ev { font-size: 10px; } }
@media (min-width: 1600px) { #log-panel { width: 380px; } }

body.night-mode #log-panel { background: rgba(0,8,30,0.3); }

/* ── Release Overlay ── */
#release-overlay {
  position: fixed; inset: 0; z-index: 9000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.55);
  animation: fadeInOut 3.5s ease forwards;
  pointer-events: none;
}
@keyframes fadeInOut {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  75%  { opacity: 1; }
  100% { opacity: 0; }
}
#release-card {
  background: linear-gradient(135deg, #1e1040, #2d1b6e);
  border: 2px solid rgba(167,139,250,0.5);
  border-radius: 20px; padding: 28px 36px;
  text-align: center; max-width: 320px;
  box-shadow: 0 0 60px rgba(139,92,246,0.4);
}
#release-emoji { font-size: 48px; margin-bottom: 8px; }
#release-ver   { font-size: 22px; font-weight: 800; color: #a78bfa; margin-bottom: 16px; }
#release-stats { font-size: 14px; line-height: 2; color: rgba(255,255,255,0.75); }
#release-next  { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 14px; }

/* ── Info Bar ── */
#info-bar {
  display: flex; justify-content: space-around; align-items: center;
  padding: 5px 8px; background: rgba(0,0,0,0.35); flex-shrink: 0;
  font-size: 10px; color: rgba(255,255,255,0.4); gap: 4px; flex-wrap: wrap;
  transition: background 5s ease;
}
body.night-mode #info-bar { background: rgba(0,5,20,0.5); }
#info-bar span { white-space: nowrap; }

/* ── Desktop responsive ── */
@media (min-width: 768px) {
  #top-bar { padding: 10px 20px; }
  #money-display { font-size: 18px; }
  #money-display small { font-size: 12px; }
  .top-btn { padding: 8px 22px; font-size: 14px; }

  #pm-panel { width: 160px; padding: 16px 12px; gap: 10px; }
  #pm-ring-wrap { width: 92px; height: 92px; }
  #pm-ring { width: 92px; height: 92px; }
  #pm-char { font-size: 40px; }
  #pm-label { font-size: 15px; }
  #pm-sub   { font-size: 11px; }
  .pm-stat-row { font-size: 11px; }
  .pm-stat-row:last-child { margin-bottom: 0; }

  #emp-area { gap: 10px; padding: 12px 10px; }

  .emp-card { min-height: 140px; padding: 12px; }
  .emp-card-top { margin-bottom: 7px; }
  .emp-name { font-size: 13px; }
  .emp-emoji { font-size: 22px; }
  .emp-rarity { font-size: 10px; }
  .bar-track { height: 5px; }
  .bar-label-row { font-size: 10px; }
  .emp-stats { font-size: 10px; }
  .emp-stat-num { font-size: 12px; }
  .emp-state-badge { font-size: 10px; padding: 2px 8px; }
  .emp-slot-empty { min-height: 140px; font-size: 13px; }
  .emp-slot-empty .slot-icon { font-size: 26px; }

  #info-bar { padding: 7px 20px; font-size: 12px; }
}

@media (min-width: 1200px) {
  #pm-panel { width: 200px; gap: 14px; padding: 20px 16px; }
  #pm-ring-wrap { width: 110px; height: 110px; }
  #pm-ring { width: 110px; height: 110px; }
  #pm-char { font-size: 50px; }
  #pm-label { font-size: 17px; }
  .pm-stat-row { font-size: 12px; }

  #emp-area { gap: 14px; padding: 16px 14px; }
  .emp-card { min-height: 160px; padding: 14px; }
  .emp-name { font-size: 14px; }
  .emp-emoji { font-size: 26px; }
}

/* ── Overlays ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  transition: opacity 0.25s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.panel {
  background: linear-gradient(160deg, #1a1535, #251e4a);
  border-radius: 22px 22px 0 0; width: 100%; max-width: 720px;
  padding: 20px 16px 28px; max-height: 85vh; overflow-y: auto;
  border-top: 1px solid rgba(255,255,255,0.1);
  animation: slideUp 0.28s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes slideUp {
  from { transform: translateY(50px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.panel-title { text-align: center; font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.panel-sub   { text-align: center; font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.panel-close {
  display: block; margin: 16px auto 0; padding: 9px 32px;
  border: none; border-radius: 50px; background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.5); font-size: 13px; font-family: inherit; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1); transition: background 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.13); color: #fff; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Recruit ── */
.recruit-rates {
  background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 14px;
  display: flex; justify-content: space-around; margin-bottom: 14px;
}
.rate-item { text-align: center; }
.rate-rarity { font-size: 11px; font-weight: 700; }
.rate-pct { font-size: 16px; font-weight: 800; }
.rate-R   { color: #94a3b8; }
.rate-SR  { color: #a78bfa; }
.rate-SSR { color: #fbbf24; }

.recruit-btns { display: flex; gap: 8px; margin-bottom: 14px; }
.recruit-btn {
  flex: 1; padding: 13px 0; border: none; border-radius: 14px;
  font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit;
  transition: transform 0.15s;
}
.recruit-btn:active { transform: scale(0.96); }
.recruit-btn:disabled { opacity: 0.38; cursor: default; }
#btn-pull1  { background: linear-gradient(135deg, #6d28d9, #a855f7); color: #fff; }
#btn-pull10 { background: linear-gradient(135deg, #7c3aed, #c084fc); color: #fff; }
.recruit-btn small { display: block; font-size: 10px; font-weight: 400; opacity: 0.7; margin-top: 2px; }

.pool-upgrade-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.04); border-radius: 12px; padding: 10px 14px;
}
.pool-info { flex: 1; }
.pool-level-label { font-size: 12px; font-weight: 700; color: #c084fc; }
.pool-desc { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }
.pool-upgrade-btn {
  padding: 7px 14px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  color: #fff; font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: transform 0.15s;
}
.pool-upgrade-btn:disabled { opacity: 0.35; cursor: default; }

.pull-result-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.pull-result-cards { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.pull-card {
  border-radius: 10px; padding: 8px 10px; text-align: center;
  border: 2px solid; min-width: 70px; position: relative;
  animation: cardReveal 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  cursor: pointer; transition: opacity 0.2s, filter 0.2s, transform 0.15s;

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const RARITY = {
  R:   { label:'R',   emoji:'👨‍💻', speedR:[1,3],  staminaR:[2,5],  qualityR:[1,3]  },
  SR:  { label:'SR',  emoji:'🧑‍💻', speedR:[3,6],  staminaR:[5,8],  qualityR:[3,6]  },
  SSR: { label:'SSR', emoji:'🥷',  speedR:[6,10], staminaR:[7,10], qualityR:[6,10] },
};

const POOL_RATES = [
  [0.05, 0.25, 0.70],
  [0.08, 0.32, 0.60],
  [0.12, 0.38, 0.50],
  [0.18, 0.44, 0.38],
  [0.25, 0.50, 0.25],
];
const POOL_UPGRADE_COSTS = [200, 500, 1200, 3000];
const PULL_COST_1  = 50;
const PULL_COST_10 = 450;
const WORKSTATION_COSTS = [150, 400, 1000, 2500, 6000, 15000];
const EMP_NAMES = ['张三','李四','王五','赵六','陈七','刘八','小明','小红','大壮','萌萌',
                   '阿强','小花','老王','小李','阿明','彩虹','阿豪','静静','小杰','大牛'];

const DISTRACT_DUR = 12; // fixed seconds per distraction episode
const TICK_SEC     = 0.1;
const WORK_START   = 10 / 24;  // 10:00 AM (PM only)
const WORK_END     = 20 / 24;  // 20:00 PM (PM only, triggers log)
const OFF_SPEED    = 6;        // time multiplier during off-hours

// Per-rarity work-hour ranges [startMin, startMax, endMin, endMax] in 24h fractions
const RARITY_SCHEDULE = {
  R:   { start: [10/24, 12/24], end: [17/24, 20/24] },  // 最晚到最早走
  SR:  { start: [ 9/24, 11/24], end: [19/24, 21/24] },  // 基本准时
  SSR: { start: [8.5/24, 10/24], end: [20/24, 22/24] }, // 卷王，早来晚走
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const state = {
  money: 500,
  totalEarned: 0,
  // Day system
  dayCount: 1,
  dayProgress: 0,      // 0..1
  dayDuration: 120,    // real seconds per in-game day
  // Req pool
  reqPool: 5,          // start with 5 so employees can work immediately
  reqPoolMax: 20,
  reqPerDay: 5,
  reqAccumulator: 0,   // fractional accumulator for smooth generation
  reqSent: 0,
  // Bonuses
  qualityBonus: 0,     // +20% per shop level
  equipBonus: 0,       // +1 speed per shop level
  focusBonus: 0,       // +8s focus duration per shop level
  // Meta
  workstationCount: 4,
  poolLevel: 0,        // gacha pool upgrade level
  shopLevels: { pm_output: 0, quality_bonus: 0, equipment: 0, workstation: 0, focus_train: 0 },
  employees: [],
  empIdCounter: 0,
  // Time & work phase
  workPhase: 'working',   // 'working' | 'offduty'
  // Temp day modifiers (reset each midnight)
  reqValueBonus: 0,
  // Pending events for current day [{triggerAt, evtId, empId}]
  pendingEvents: [],
  // Daily stats (reset each day-end)
  dayStats: { reqs: 0, earned: 0, zoned: 0, snaps: 0, eventCount: 0 },
  // Log
  logs: [],
  // Product releases
  totalReqs: 0,         // lifetime completed requirements
  releaseCount: 0,      // how many versions shipped
  releaseValueBonus: 0, // permanent req value multiplier (0.05 per release, max 0.8)
};

// Projectile queue (limit to one per 400ms for readability)
let projQueue = [];
let projTimer  = 0;

// ══════════════════════════════════════════
//  EMPLOYEE FACTORY
// ══════════════════════════════════════════
function ri(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }

function createEmployee(rarity) {
  const cfg  = RARITY[rarity];
  const id   = state.empIdCounter++;
  const used = new Set(state.employees.map(e => e.name));
  const pool = EMP_NAMES.filter(n => !used.has(n));
  const name = pool.length ? pool[Math.floor(Math.random() * pool.length)] : `员工${id}`;
  const emp = {
    id, name, rarity, emoji: cfg.emoji,
    speed:   ri(...cfg.speedR),
    stamina: ri(...cfg.staminaR),
    quality: ri(...cfg.qualityR),
    state: 'idle',
    reqWorkNeeded: 0,
    reqWorkDone:   0,
    workProgress:  0,
    focusMax:      0,
    focusTimer:    0,
    distractTimer: 0,
    snapPenalty:   0,
    isZoned:       false,
    workStart:     WORK_START,
    workEnd:       WORK_END,
    tempSpeed:     0,   // day-temp speed modifier
    tempQuality:   0,   // day-temp quality modifier
    distractBoost: 0,   // day-temp extra zoned probability
  };
  randomizeEmpSchedule(emp);
  return emp;
}

function pullRarity() {
  const [ssr, sr] = POOL_RATES[state.poolLevel];
  const r = Math.random();
  if (r < ssr)       return 'SSR';
  if (r < ssr + sr)  return 'SR';
  return 'R';
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function isWorkTime() {
  return state.dayProgress >= WORK_START && state.dayProgress < WORK_END;
}

function fmtTime(frac) {
  const h = Math.floor(frac * 24);
  const m = Math.floor((frac * 24 - h) * 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function getGameTime() { return fmtTime(state.dayProgress); }

function isEmpWorkTime(emp) {
  return state.dayProgress >= emp.workStart && state.dayProgress < emp.workEnd;
}

function randomizeEmpSchedule(emp) {
  const cfg = RARITY_SCHEDULE[emp.rarity];
  // Pool influence: full pool → start earlier & end later; empty → opposite
  const poolFill  = state.reqPool / state.reqPoolMax;
  const poolShift = (poolFill - 0.5) * (1.5 / 24); // ±45min max
  const [s0, s1]  = cfg.start;
  const [e0, e1]  = cfg.end;
  emp.workStart = Math.max(7/24, Math.min(13/24, s0 + Math.random() * (s1 - s0) - poolShift));
  emp.workEnd   = Math.max(15/24, Math.min(23/24, e0 + Math.random() * (e1 - e0) + poolShift));
}

function randomizeAllEmpSchedules() {
  state.employees.forEach(emp => randomizeEmpSchedule(emp));
}

function effectiveSpeed(emp) { return Math.max(1, emp.speed + state.equipBonus + (emp.tempSpeed || 0)); }

// Pure focus-seconds needed per req (max 30s = ~0.25 day, min capped by speed)
function reqWorkSec(emp) { return Math.max(30, 120 / effectiveSpeed(emp)); }

// Revenue per completed req
function reqValue(emp) {
  const q = Math.max(1, emp.quality + (emp.tempQuality || 0));
  return Math.round((8 + q * 3) * (1 + state.qualityBonus + (state.reqValueBonus || 0) + (state.releaseValueBonus || 0)));
}

// Focus window duration
function focusDuration(emp) { return emp.stamina * 8 + state.focusBonus; }

function idleEmployees()      { return state.employees.filter(e => e.state === 'idle'); }
function focusingEmployees()  { return state.employees.filter(e => e.state === 'focusing'); }
function distractedEmployees(){ return state.employees.filter(e => e.state === 'distracted'); }

// ══════════════════════════════════════════
//  ASSIGN REQ FROM POOL
// ══════════════════════════════════════════
function assignReq(emp) {
  state.reqPool--;
  state.reqSent++;
  emp.state        = 'focusing';
  emp.reqWorkDone  = 0;
  emp.reqWorkNeeded= reqWorkSec(emp);
  emp.focusMax     = focusDuration(emp);
  emp.focusTimer   = emp.focusMax;
  emp.distractTimer= 0;
  emp.workProgress = 0;
  projQueue.push(emp.id);
}

function assignReqs() {
  const idle = state.employees.filter(e => e.state === 'idle' && isEmpWorkTime(e));
  for (const emp of idle) {
    if (state.reqPool <= 0) break;
    assignReq(emp);
  }
}

// ══════════════════════════════════════════
//  COMPLETE REQ
// ══════════════════════════════════════════
// ── Product Release Milestones ─────────────────────────────────
const MILESTONES = [10, 25, 50, 100, 175, 275, 400, 550, 750, 1000];

function getNextMilestoneReqs() {
  const idx = state.releaseCount;
  if (idx < MILESTONES.length) return MILESTONES[idx];
  return MILESTONES[MILESTONES.length - 1] + (idx - MILESTONES.length + 1) * 300;
}

function checkMilestone() {
  const needed = getNextMilestoneReqs();
  if (state.totalReqs < needed) return;
  state.releaseCount++;
  const bonus = Math.round(800 * Math.pow(1.8, state.releaseCount - 1));
  state.releaseValueBonus = Math.min(state.releaseValueBonus + 0.05, 0.8);
  state.money       += bonus;
  state.totalEarned += bonus;
  triggerRelease(bonus);
}

function triggerRelease(bonus) {
  const ver = `v${state.releaseCount}.0`;
  const entry = {
    type: 'event', day: state.dayCount, time: getGameTime(),
    icon: '🚀', title: `${ver} 正式发布！`,
    desc: `累计完成 ${state.totalReqs} 个需求，获得 ${bonus}💰 奖励，收益加成 +${Math.round(state.releaseValueBonus * 100)}%`
  };
  state.logs.unshift(entry);
  if (state.logs.length > 50) state.logs.pop();
  renderLogPanel();
  showReleaseOverlay(ver, bonus);
  const pm = document.getElementById('pm-char');
  if (pm) {
    const r = pm.getBoundingClientRect();
    spawnFloat(`🚀 ${ver}`, r.left + r.width / 2, r.top - 20, '#a78bfa', '16px');
  }
}

function showReleaseOverlay(ver, bonus) {
  const el = document.createElement('div');
  el.id = 'release-overlay';
  el.innerHTML = `
    <div id="release-card">
      <div id="release-emoji">🚀</div>
      <div id="release-ver">${ver} 正式发布！</div>
      <div id="release-stats">
        <div>共完成 <b>${state.totalReqs}</b> 个需求</div>
        <div>奖励 <b style="color:#fde68a">+${bonus}💰</b></div>
        <div>永久收益加成 <b style="color:#a78bfa">+${Math.round(state.releaseValueBonus * 100)}%</b></div>
      </div>
      <div id="release-next">下一版本：再完成 ${getNextMilestoneReqs() - state.totalReqs} 个需求</div>
    </div>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
// ───────────────────────────────────────────────────────────────

function completeReq(emp) {
  const earned = reqValue(emp);
  state.money       += earned;
  state.totalEarned += earned;

  const empEl = document.querySelector(`.emp-card[data-emp-id="${emp.id}"]`);
  if (empEl) {
    const rect = empEl.getBoundingClientRect();
    spawnFloat(`+${earned}💰`, rect.left + rect.width / 2, rect.top + 10);
  }

  emp.state        = 'idle';
  emp.reqWorkDone  = 0;
  emp.reqWorkNeeded= 0;
  emp.workProgress = 0;
  emp.focusTimer   = 0;
  emp.distractTimer= 0;
  emp.snapPenalty  = 0; // reset penalty after each req
  state.dayStats.reqs++;
  state.dayStats.earned += earned;
  state.totalReqs++;
  checkMilestone();
  updateTopUI();
}

// ══════════════════════════════════════════

function scheduleEvents() {
  // Reset day-temp modifiers at midnight
  state.reqValueBonus = 0;
  state.employees.forEach(e => { e.tempSpeed = 0; e.tempQuality = 0; e.distractBoost = 0; });

  // Decide how many events today: 0→20%, 1→40%, 2→28%, 3→12%
  const r = Math.random();
  const count = r < 0.20 ? 0 : r < 0.60 ? 1 : r < 0.88 ? 2 : 3;
  const usedIds = new Set();
  const pending = [];

  for (let i = 0; i < count; i++) {
    const pool = EVENTS.filter(ev => !usedIds.has(ev.id) && (!ev.emp || state.employees.length > 0));
    if (!pool.length) break;
    const total = pool.reduce((s, ev) => s + ev.w, 0);
    let pick = Math.random() * total;
    const ev = pool.find(e => { pick -= e.w; return pick <= 0; }) || pool[pool.length - 1];
    usedIds.add(ev.id);
    const empId = ev.emp && state.employees.length > 0
      ? state.employees[Math.floor(Math.random() * state.employees.length)].id
      : null;
    pending.push({ triggerAt: Math.random(), evtId: ev.id, empId });
  }

  pending.sort((a, b) => a.triggerAt - b.triggerAt);
  state.pendingEvents = pending;
}

function fireEvent(pending) {
  const ev = EVENTS.find(e => e.id === pending.evtId);
  if (!ev) return;
  const emp = pending.empId !== null ? state.employees.find(e => e.id === pending.empId) : null;
  if (ev.emp && !emp) return; // employee was fired before event triggered

  const result = ev.gen(emp);
  result.apply(emp || undefined);
  state.dayStats.eventCount++;

  // Add live event entry to log
  const entry = { type: 'event', day: state.dayCount, time: getGameTime(), icon: ev.icon, title: result.title, desc: result.desc };
  state.logs.unshift(entry);
  if (state.logs.length > 50) state.logs.pop();
  renderLogPanel();

  // Float FX near PM
  const pmEl = document.getElementById('pm-char');
  if (pmEl) {
    const rect = pmEl.getBoundingClientRect();
    spawnFloat(`${ev.icon} ${result.title}`, rect.left + rect.width / 2, rect.top - 16, '#fde68a', '11px');
  }
}

function applyTheme(isWork) {
  const bgDay   = document.getElementById('bg-day');
  const bgNight = document.getElementById('bg-night');
  if (bgDay)   bgDay.style.opacity   = isWork ? '1' : '0';
  if (bgNight) bgNight.style.opacity = isWork ? '0' : '1';
  if (isWork) document.body.classList.remove('night-mode');
  else        document.body.classList.add('night-mode');
}

// ══════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════
function generateDayLog() {
  const d = state.dayStats;
  const n = state.employees.length;
  const lines = [];
  if (d.reqs > 0) lines.push(`✅ 完成需求 ${d.reqs} 个，收益 ${d.earned}g`);
  else            lines.push('⚠️ 今日无需求完成');
  lines.push(`👥 在岗员工 ${n} 人 | 需求池余量 ${state.reqPool}`);
  if (d.zoned > 0) {
    const snapTxt = d.snaps > 0 ? `，被唤醒 ${d.snaps} 次` : '，均未被唤醒';
    lines.push(`😴 深度走神 ${d.zoned} 次${snapTxt}`);
  }
  if (d.eventCount > 0) lines.push(`🎲 今日发生 ${d.eventCount} 起随机事件`);
  if (n === 0) lines.push('💡 快去招募第一位员工吧！');

  state.logs.unshift({ type: 'summary', day: state.dayCount, lines });
  if (state.logs.length > 50) state.logs.pop();
  state.dayStats = { reqs: 0, earned: 0, zoned: 0, snaps: 0, eventCount: 0 };
  renderLogPanel();
}

function renderLogPanel() {
  const el = document.getElementById('log-entries');
  if (!el) return;
  if (!state.logs.length) {
    el.innerHTML = '<div class="log-placeholder">每天会在此实时记录<br>随机事件与下班汇报</div>';
    return;
  }
  el.innerHTML = state.logs.map(entry => {
    if (entry.type === 'event') {
      return `<div class="log-entry log-entry-event">
        <div class="log-day-ev">🔔 第${entry.day}天 ${entry.time}</div>
        <div class="log-event-title">${entry.icon} ${entry.title}</div>
        <div class="log-event-desc">${entry.desc}</div>
      </div>`;
    }
    return `<div class="log-entry">
      <div class="log-day">第 ${entry.day} 天 · 下班汇报</div>
      ${entry.lines.map(l => `<div class="log-line">${l}</div>`).join('')}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  RENDER SCENE
// ══════════════════════════════════════════
function renderScene() {
  const area = document.getElementById('emp-area');
  area.innerHTML = '';

  const hint = document.createElement('div');
  hint.id = 'no-emp-hint';
  hint.innerHTML = '点击上方「招募」<br>召唤你的第一位员工';
  hint.style.display = state.employees.length === 0 ? 'block' : 'none';
  area.appendChild(hint);

  state.employees.forEach(emp => area.appendChild(buildEmpCard(emp)));

  const empty = state.workstationCount - state.employees.length;
  for (let i = 0; i < empty; i++) {
    const slot = document.createElement('div');
    slot.className = 'emp-slot-empty';
    slot.innerHTML = `<span class="slot-icon">🖥️</span><span>空工位</span>`;
    area.appendChild(slot);
  }
  updateInfoBar();
}

function getStateLabel(emp) {
  if (!isEmpWorkTime(emp)) {
    if (state.dayProgress < emp.workStart)
      return `⏰ ${fmtTime(emp.workStart)} 上班`;
    return `🏠 明日 ${fmtTime(emp.workStart)} 上班`;
  }
  if (emp.state === 'idle')       return '⏳ 待命中';
  if (emp.state === 'focusing')   return `🎯 专注中 ${Math.ceil(Math.max(0, emp.focusTimer))}s`;
  if (emp.state === 'distracted') return emp.isZoned ? '😴 深度走神' : `💤 走神了 ${Math.ceil(Math.max(0, emp.distractTimer))}s`;
  return '';
}

function buildEmpCard(emp) {
  const div = document.createElement('div');
  div.className = `emp-card rarity-${emp.rarity} state-${emp.state}${emp.isZoned ? ' is-zoned' : ''}`;
  div.dataset.empId = emp.id;

  const wPct = Math.round(emp.workProgress * 100);
  let focusPct = 0, focusBarClass = 'bar-fill bar-focus-active emp-focus-bar';
  if (emp.state === 'focusing' && emp.focusMax > 0) {
    focusPct = Math.round((1 - emp.focusTimer / emp.focusMax) * 100);
  } else if (emp.state === 'distracted') {
    focusPct = Math.round((emp.distractTimer / DISTRACT_DUR) * 100);
    focusBarClass = 'bar-fill bar-distract emp-focus-bar';
  }

  div.innerHTML = `
    <div class="emp-card-top">
      <span class="emp-rarity">${emp.rarity}</span>
      <span class="emp-name">${emp.name}</span>
      <span class="emp-emoji">${emp.emoji}</span>
      <button class="emp-manage-btn" data-manage-id="${emp.id}" title="员工管理">⚙</button>
    </div>
    <div class="bar-row">
      <div class="bar-label-row"><span>需求进度</span><span class="emp-work-pct">${wPct}%</span></div>
      <div class="bar-track"><div class="bar-fill bar-work emp-work-bar" style="width:${wPct}%"></div></div>
    </div>
    <div class="bar-row">
      <div class="bar-label-row"><span class="emp-focus-label">${emp.state === 'distracted' ? '走神倒计时' : '专注窗口'}</span></div>
      <div class="bar-track"><div class="${focusBarClass}" style="width:${focusPct}%"></div></div>
    </div>
    <div class="emp-stats">
      <div class="emp-stat-item"><span class="emp-stat-num emp-spd-num">${effectiveSpeed(emp)}</span>速度</div>
      <div class="emp-stat-item"><span class="emp-stat-num">${emp.stamina}</span>精力</div>
      <div class="emp-stat-item"><span class="emp-stat-num">${emp.quality}</span>质量</div>
    </div>
    <span class="emp-state-badge">${getStateLabel(emp)}</span>`;
  return div;
}

function updateEmpCard(emp) {
  const div = document.querySelector(`.emp-card[data-emp-id="${emp.id}"]`);
  if (!div) return;

  const offDuty = !isEmpWorkTime(emp);
  div.className = `emp-card rarity-${emp.rarity} state-${offDuty ? 'idle' : emp.state}${(!offDuty && emp.isZoned) ? ' is-zoned' : ''}${offDuty ? ' off-duty' : ''}`;

  const wPct = Math.round(emp.workProgress * 100);
  let focusPct = 0, focusBarClass = 'bar-fill bar-focus-active emp-focus-bar';
  if (!offDuty && emp.state === 'focusing' && emp.focusMax > 0) {
    focusPct = Math.round((1 - emp.focusTimer / emp.focusMax) * 100);
  } else if (!offDuty && emp.state === 'distracted') {
    focusPct = emp.isZoned ? 100 : Math.round((emp.distractTimer / DISTRACT_DUR) * 100);
    focusBarClass = 'bar-fill bar-distract emp-focus-bar';
  }

  const wBar  = div.querySelector('.emp-work-bar');
  const fBar  = div.querySelector('.emp-focus-bar');
  const wPctEl= div.querySelector('.emp-work-pct');
  const badge = div.querySelector('.emp-state-badge');
  const fLbl  = div.querySelector('.emp-focus-label');
  const spdEl = div.querySelector('.emp-spd-num');

  if (wBar)  wBar.style.width  = wPct + '%';
  if (fBar)  { fBar.style.width = focusPct + '%'; fBar.className = focusBarClass; }
  if (wPctEl) wPctEl.textContent = wPct + '%';
  if (badge)  badge.textContent  = getStateLabel(emp);
  if (fLbl)   fLbl.textContent   = emp.state === 'distracted' ? '走神倒计时' : '专注窗口';
  if (spdEl)  spdEl.textContent  = effectiveSpeed(emp);
}

function updateDayRing() {

  const work   = isWorkTime();
  const color  = work ? '#a855f7' : '#3b5068';
  const ring   = document.getElementById('pm-ring');
  ring.style.background = `conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.06) 0deg)`;
  document.getElementById('day-count').textContent  = state.dayCount;
  document.getElementById('pm-time').textContent    = getGameTime();
  document.getElementById('pm-sub').textContent     = work ? '工作中 🧑‍💼' : '已下班 🌙';
  document.getElementById('info-day').textContent   = `第${state.dayCount}天 ${getGameTime()}`;
}

function updatePoolDisplay() {
  const pct = Math.round((state.reqPool / state.reqPoolMax) * 100);
  document.getElementById('stat-pool').textContent    = `${state.reqPool}/${state.reqPoolMax}`;
  document.getElementById('pool-bar').style.width     = pct + '%';
  document.getElementById('info-pool').textContent    = `📋 池: ${state.reqPool}/${state.reqPoolMax}`;

function updateInfoBar() {
  document.getElementById('info-idle').textContent       = `⏳ 待命: ${idleEmployees().length}`;
  document.getElementById('info-focusing').textContent   = `🎯 专注: ${focusingEmployees().length}`;

  document.getElementById('total-val').textContent    = state.totalEarned;
  document.getElementById('stat-output').textContent  = `${state.reqPerDay}/天`;

}

function spawnFloat(text, x, y, color, size) {
  const el = document.createElement('div');
  el.className  = 'float-text';
  el.textContent= text;
  el.style.left = (x - 20) + 'px';
  el.style.top  = y + 'px';
  if (color) el.style.color = color;
  if (size)  el.style.fontSize = size;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function spawnDayFX() {
  const pmEl = document.getElementById('pm-char');

//  PROJECTILE
// ══════════════════════════════════════════
function fireProjectile(targetEmpId) {
  const pmEl  = document.getElementById('pm-char');
  const empEl = document.querySelector(`.emp-card[data-emp-id="${targetEmpId}"]`);
  if (!pmEl || !empEl) return;

  const pmRect  = pmEl.getBoundingClientRect();
  const empRect = empEl.getBoundingClientRect();
  const startX  = pmRect.right;
  const startY  = pmRect.top + pmRect.height / 2;
  const endX    = empRect.left + empRect.width * 0.55;
  const endY    = empRect.top  + empRect.height * 0.2;
  const dx = endX - startX, dy = endY - startY;
  const midY = -Math.abs(dx) * 0.25;

  const proj = document.createElement('div');
  proj.className  = 'req-proj';
  proj.textContent= '📋';
  proj.style.left = startX + 'px';
  proj.style.top  = startY + 'px';
  document.body.appendChild(proj);

  proj.animate([
    { transform: `translate(0,0) scale(1) rotate(0deg)`,                                  opacity: 1, offset: 0    },
    { transform: `translate(${dx*0.45}px,${dy*0.5+midY}px) scale(1.15) rotate(-20deg)`,  opacity: 1, offset: 0.45 },
    { transform: `translate(${dx}px,${dy}px) scale(0.75) rotate(-35deg)`,                 opacity: 0.85, offset: 1 },
  ], { duration: 480, easing: 'ease-in-out', fill: 'forwards' }).onfinish = () => {
    proj.remove();
    empEl.classList.add('req-received');
    setTimeout(() => empEl.classList.remove('req-received'), 320);
  };

  // PM throw animation + speech
  const speech = document.getElementById('pm-speech');
  pmEl.classList.remove('sending'); void pmEl.offsetWidth; pmEl.classList.add('sending');
  speech.classList.add('show');
  setTimeout(() => speech.classList.remove('show'), 500);
}

// ══════════════════════════════════════════
//  TICK
// ══════════════════════════════════════════
function tick() {
  const work     = isWorkTime();
  const speedMul = work ? 1 : OFF_SPEED;

  // 1. Detect work-phase transitions
  if (state.workPhase === 'working' && !work) {
    state.workPhase = 'offduty';
    applyTheme(false);
    generateDayLog();
    spawnFloat('🌙 下班了', (() => {
      const pm = document.getElementById('pm-char');
      const r  = pm ? pm.getBoundingClientRect() : { left: 60, width: 30, top: 80 };
      return r.left + r.width / 2;
    })(), (() => {
      const pm = document.getElementById('pm-char');
      return pm ? pm.getBoundingClientRect().top - 8 : 80;
    })(), '#93c5fd', '12px');
  } else if (state.workPhase === 'offduty' && work) {
    state.workPhase = 'working';
    applyTheme(true);
    spawnFloat('☀️ 上班了', (() => {
      const pm = document.getElementById('pm-char');
      const r  = pm ? pm.getBoundingClientRect() : { left: 60, width: 30, top: 80 };
      return r.left + r.width / 2;
    })(), (() => {
      const pm = document.getElementById('pm-char');
      return pm ? pm.getBoundingClientRect().top - 8 : 80;
    })(), '#fde68a', '12px');
  }

  // 2. Advance day (off-hours run faster)
  const dpInc = TICK_SEC / state.dayDuration * speedMul;
  state.dayProgress += dpInc;
  if (state.dayProgress >= 1) {
    state.dayProgress -= 1;
    state.dayCount++;
    spawnDayFX();
    randomizeAllEmpSchedules();
    scheduleEvents(); // plan random events for the new day
  }

  // Fire any pending events whose trigger time has arrived
  while (state.pendingEvents.length > 0 && state.pendingEvents[0].triggerAt <= state.dayProgress) {
    fireEvent(state.pendingEvents.shift());
  }

  // 3. Accumulate reqs proportional to dayProgress increment (reqPerDay per game-day)
  state.reqAccumulator += state.reqPerDay * dpInc;
  while (state.reqAccumulator >= 1) {
    state.reqAccumulator -= 1;
    if (state.reqPool < state.reqPoolMax) {
      state.reqPool++;
      if (work) spawnPoolAddFX();
    }
  }

  // 4. Assign reqs & fire projectiles (always check, filtered inside assignReqs by per-emp schedule)
  assignReqs();
  projTimer -= TICK_SEC;
  if (projTimer <= 0 && projQueue.length > 0) {
    fireProjectile(projQueue.shift());
    projTimer = 0.4;
  }

  // 5. Update display
  updateDayRing();
  updatePoolDisplay();

  // 6. Employee ticks — each employee ticks only during their personal work hours
  for (const emp of state.employees) {
    if (!isEmpWorkTime(emp)) {
      updateEmpCard(emp);
      continue;
    }

    if (emp.state === 'focusing') {
      emp.reqWorkDone += TICK_SEC;
      emp.focusTimer  -= TICK_SEC;
      emp.workProgress = Math.min(1, emp.reqWorkDone / emp.reqWorkNeeded);

      if (emp.reqWorkDone >= emp.reqWorkNeeded) {
        completeReq(emp);
        if (state.reqPool > 0) assignReq(emp);
      } else if (emp.focusTimer <= 0) {
        emp.state        = 'distracted';
        emp.distractTimer= DISTRACT_DUR;
        emp.isZoned = Math.random() < Math.max(0, Math.min(0.9, (10 - emp.stamina) * 0.06 + (emp.distractBoost || 0)));
        if (emp.isZoned) state.dayStats.zoned++;
      }
      updateEmpCard(emp);
    } else if (emp.state === 'distracted') {
      if (!emp.isZoned) {
        emp.distractTimer -= TICK_SEC;
        if (emp.distractTimer <= 0) {
          emp.state     = 'focusing';
          emp.focusTimer= focusDuration(emp);
          emp.focusMax  = emp.focusTimer;
          emp.isZoned   = false;
        }
      }
      updateEmpCard(emp);
    }
  }

  updateInfoBar();
}

function renderRecruitPanel() {
  const [ssr, sr, r] = POOL_RATES[state.poolLevel];
  document.getElementById('recruit-sub').textContent = `卡池 Lv.${state.poolLevel + 1}  ·  当前概率分布`;
  document.getElementById('recruit-rates').innerHTML = `
    <div class="rate-item"><div class="rate-rarity rate-SSR">SSR</div><div class="rate-pct rate-SSR">${Math.round(ssr*100)}%</div></div>
    <div class="rate-item"><div class="rate-rarity rate-SR">SR</div><div class="rate-pct rate-SR">${Math.round(sr*100)}%</div></div>
    <div class="rate-item"><div class="rate-rarity rate-R">R</div><div class="rate-pct rate-R">${Math.round(r*100)}%</div></div>`;

  const freeSlots = state.workstationCount - state.employees.length;
  document.getElementById('btn-pull1').disabled  = state.money < PULL_COST_1  || freeSlots <= 0;
  document.getElementById('btn-pull10').disabled = state.money < PULL_COST_10 || freeSlots <= 0;

  const pRow = document.getElementById('pool-upgrade-row');
  if (state.poolLevel >= POOL_UPGRADE_COSTS.length) {
    pRow.innerHTML = `<div class="pool-info"><div class="pool-level-label">✨ 卡池已满级</div><div class="pool-desc">SSR 概率已达最高</div></div>`;
  } else {
    const nextCost  = POOL_UPGRADE_COSTS[state.poolLevel];
    const nextRates = POOL_RATES[state.poolLevel + 1];
    const canUp     = state.money >= nextCost;
    pRow.innerHTML = `
      <div class="pool-info">
        <div class="pool-level-label">卡池等级 ${state.poolLevel + 1} / ${POOL_UPGRADE_COSTS.length + 1}</div>
        <div class="pool-desc">升级后 SSR ${Math.round(nextRates[0]*100)}% · SR ${Math.round(nextRates[1]*100)}%</div>
      </div>
      <button class="pool-upgrade-btn" id="pool-up-btn" ${canUp ? '' : 'disabled'}>升级 💰${nextCost}</button>`;
    document.getElementById('pool-up-btn').addEventListener('click', () => {
      if (state.money < nextCost || state.poolLevel >= POOL_UPGRADE_COSTS.length) return;
      state.money -= nextCost;
      state.poolLevel++;
      updateTopUI();
      renderRecruitPanel();
    });
  }
}

function doPull(count) {
  const cost = count === 1 ? PULL_COST_1 : PULL_COST_10;
  const freeSlots = state.workstationCount - state.employees.length;
  if (state.money < cost || freeSlots <= 0) return;

  state.money -= cost;
  updateTopUI();

  const pulled = [];
  for (let i = 0; i < count; i++) pulled.push(createEmployee(pullRarity()));

  showPullResult(pulled, freeSlots);
}

function showPullResult(pulled, freeSlots) {
  const resultEl = document.getElementById('pull-result');
  resultEl.style.cssText = 'display:flex;flex-direction:column;gap:10px';

  // Auto-select top N by rarity+stats
  const rarityScore = { SSR: 300, SR: 200, R: 100 };
  const ranked = pulled
    .map((emp, i) => ({ i, score: rarityScore[emp.rarity] + emp.speed + emp.stamina + emp.quality }))
    .sort((a, b) => b.score - a.score);
  const selected = new Set(ranked.slice(0, freeSlots).map(x => x.i));

  function render() {
    resultEl.innerHTML = '';

    const hint = document.createElement('div');
    hint.className = 'pull-summary';
    hint.style.marginBottom = '0';
    const ssrN = pulled.filter(e => e.rarity === 'SSR').length;
    const srN  = pulled.filter(e => e.rarity === 'SR').length;
    let hintTxt = `点击卡片选择录用（空余工位 ${freeSlots} 个）`;
    if (ssrN) hintTxt = `✨ ${ssrN} 位 SSR！ · ` + hintTxt;
    else if (srN) hintTxt = `💜 ${srN} 位 SR · ` + hintTxt;
    hint.textContent = hintTxt;
    resultEl.appendChild(hint);

    const cardsEl = document.createElement('div');
    cardsEl.className = 'pull-result-cards';
    pulled.forEach((emp, i) => {
      const isSel = selected.has(i);
      const card = document.createElement('div');
      card.className = `pull-card rarity-${emp.rarity}${isSel ? '' : ' pull-unselected'}`;
      card.style.animationDelay = (i * 0.06) + 's';
      card.innerHTML = `
        ${isSel ? '<div class="pull-sel-check">✓</div>' : ''}
        <div class="pull-card-emoji">${emp.emoji}</div>
        <div class="pull-card-name">${emp.name}</div>
        <div class="pull-card-rarity">${emp.rarity}</div>
        <div class="pull-card-stats">速${emp.speed} 精${emp.stamina} 质${emp.quality}</div>`;
      card.addEventListener('click', () => {
        if (isSel) { selected.delete(i); }
        else if (selected.size < freeSlots) { selected.add(i); }
        render();
      });
      cardsEl.appendChild(card);
    });
    resultEl.appendChild(cardsEl);

    const confirmRow = document.createElement('div');
    confirmRow.className = 'pull-confirm-row';
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'pull-confirm-btn';
    confirmBtn.disabled = selected.size === 0;
    confirmBtn.textContent = selected.size > 0
      ? `✅ 录用选中的 ${selected.size} 人`
      : '请选择要录用的员工';
    confirmBtn.addEventListener('click', () => {
      pulled.filter((_, i) => selected.has(i)).forEach(emp => state.employees.push(emp));
      renderScene();
      updateTopUI();
      renderRecruitPanel();
      resultEl.style.display = 'none';
      assignReqs();
    });
    confirmRow.appendChild(confirmBtn);
    resultEl.appendChild(confirmRow);
  }

  render();
}

document.getElementById('emp-area').addEventListener('click', e => {
  // Manage button
  const manageBtn = e.target.closest('.emp-manage-btn');
  if (manageBtn) {
    e.stopPropagation();
    openEmpManage(parseInt(manageBtn.dataset.manageId));
    return;
  }
  // Snap distracted employee
  const card = e.target.closest('.emp-card');
  if (!card) return;
  const emp = state.employees.find(em => em.id === parseInt(card.dataset.empId));
  if (!emp || emp.state !== 'distracted') return;

  const maxPenalty = Math.max(4, focusDuration(emp) * 0.5);
  emp.snapPenalty  = Math.min((emp.snapPenalty || 0) + 4, maxPenalty);
  emp.state        = 'focusing';
  emp.focusTimer   = Math.max(6, focusDuration(emp) - emp.snapPenalty);
  emp.focusMax     = emp.focusTimer;
  emp.distractTimer= 0;
  emp.isZoned      = false;
  state.dayStats.snaps++;

  const rect = card.getBoundingClientRect();
  spawnFloat('👊 拍醒！', rect.left + rect.width / 2, rect.top + 14, '#fb923c', '13px');
  card.classList.add('req-received');
  setTimeout(() => card.classList.remove('req-received'), 320);
  updateEmpCard(emp);
});

function checkVersion() {
  const seen = localStorage.getItem(VER_KEY);
  if (seen === VERSION) return; // already seen this version
  showAnnounce(seen);
}

function showAnnounce(prevVer) {
  const latest = CHANGELOG[0];
  const isNew  = !!prevVer; // false = first ever load

  let html = `
    <div class="announce-ver">🆕 v${latest.ver}</div>
    <div class="announce-title">${latest.title}</div>
    <div class="announce-date">${latest.date}${isNew ? ' · 自上次游玩后有更新' : ' · 欢迎来到需求工厂！'}</div>
    <div class="announce-section">
      <div class="announce-section-title">本次更新</div>
      ${latest.items.map(it => `
        <div class="announce-item">
          <span class="announce-item-dot">${it.icon}</span>
          <span>${it.text}</span>
        </div>`).join('')}
    </div>`;

  const history = CHANGELOG.slice(1);
  if (history.length > 0) {
    html += `<div class="announce-divider"></div>
    <div class="announce-history-title" id="announce-hist-toggle">▾ 历史版本</div>
    <div class="announce-history" id="announce-hist">`;
    history.forEach(v => {
      html += `<div class="announce-old-ver" style="margin-top:10px">
        <strong>v${v.ver}</strong> <span style="margin-left:6px;font-size:9px">${v.date} · ${v.title}</span>
      </div>`;
      v.items.forEach(it => {
        html += `<div class="announce-old-item">${it.icon} ${it.text}</div>`;
      });
    });
    html += `</div>`;
  }

  document.getElementById('announce-content').innerHTML = html;
  document.getElementById('announce-overlay').classList.remove('hidden');

  const tog = document.getElementById('announce-hist-toggle');
  if (tog) tog.addEventListener('click', () => {
    const h = document.getElementById('announce-hist');
    h.classList.toggle('open');
    tog.textContent = h.classList.contains('open') ? '▴ 历史版本' : '▾ 历史版本';
  });
}

document.getElementById('announce-close').addEventListener('click', () => {
  document.getElementById('announce-overlay').classList.add('hidden');
  localStorage.setItem(VER_KEY, VERSION);
});

const SAVE_KEY = 'reqFactory_v1';

function saveGame() {
  const data = {
    money: state.money,
    totalEarned: state.totalEarned,
    dayCount: state.dayCount,
    dayProgress: state.dayProgress,
    dayDuration: state.dayDuration,
    reqPool: state.reqPool,
    reqPoolMax: state.reqPoolMax,
    reqPerDay: state.reqPerDay,
    reqAccumulator: state.reqAccumulator,
    reqSent: state.reqSent,
    qualityBonus: state.qualityBonus,
    equipBonus: state.equipBonus,
    focusBonus: state.focusBonus,
    workstationCount: state.workstationCount,
    poolLevel: state.poolLevel,
    shopLevels: { ...state.shopLevels },
    empIdCounter: state.empIdCounter,
    employees: state.employees.map(e => ({ ...e })),
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  const badge = document.getElementById('save-badge');
  if (badge) {
    badge.style.opacity = '1';
    clearTimeout(badge._t);
    badge._t = setTimeout(() => { badge.style.opacity = '0'; }, 1500);
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    Object.assign(state, data);
    return true;
  } catch (e) {
    return false;
  }
}

function addStarterEmployees() {
  const e1 = createEmployee('R');
  e1.name = '小明'; e1.speed = 2; e1.stamina = 4; e1.quality = 2;
  const e2 = createEmployee('R');
  e2.name = '小红'; e2.speed = 2; e2.stamina = 3; e2.quality = 3;
  state.employees.push(e1, e2);
}

renderScene();
renderLogPanel();

setInterval(tick, 100);

window.addEventListener('beforeunload', saveGame);
checkVersion();
