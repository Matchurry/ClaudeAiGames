<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>宝石分类</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#game-container {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  max-width: 500px; margin: 0 auto;
  position: relative;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

#top-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px; flex-shrink: 0;
  background: rgba(0,0,0,0.3);
  z-index: 10;
}

#top-bar h1 {
  font-size: 16px;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

#level-info { font-size: 13px; opacity: 0.8; }

.btn {
  padding: 5px 12px; border: none; border-radius: 20px;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn:hover { background: rgba(255,255,255,0.25); }

#gem-area {
  flex: 1; position: relative; overflow: hidden;
  min-height: 0;
  border-bottom: 2px solid rgba(255,255,255,0.1);
}

#gem-canvas { width: 100%; height: 100%; display: block; }

#bottle-area {
  flex-shrink: 0;
  min-height: 220px;
  display: flex; justify-content: center; align-items: flex-end;
  gap: 10px; padding: 10px 8px 16px;
  flex-wrap: wrap;
}

.bottle {
  display: flex; flex-direction: column;
  align-items: center; transition: transform 0.15s;
  position: relative;
}

.bottle.highlight { transform: scale(1.08); }
.bottle.reject { animation: shake 0.3s; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.bottle-label {
  font-size: 9px; opacity: 0.7;
  margin-bottom: 1px; height: 14px;
  text-align: center; white-space: nowrap;
}

.bottle-body {
  position: relative;
  border: 2px solid rgba(255,255,255,0.45);
  border-radius: 0 0 12px 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.08) 100%);
  overflow: hidden;
  box-shadow: inset 0 0 10px rgba(255,255,255,0.06), 0 2px 6px rgba(0,0,0,0.3);
}

.bottle-body::after {
  content: '';
  position: absolute; top: 0; left: 3px;
  width: 4px; height: 85%;
  background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
  border-radius: 2px;
  pointer-events: none;
}

.bottle-neck {
  border: 2px solid rgba(255,255,255,0.45);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
  margin: 0 auto;
}

.bottle-gem-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.bottle-full-mark {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 24px; opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.bottle.full .bottle-full-mark { opacity: 1; }

.bottle-count {
  font-size: 10px; margin-top: 2px; opacity: 0.7;
}

#drag-gem {
  position: fixed; pointer-events: none;
  z-index: 100; display: none;
}

#drag-canvas { width: 60px; height: 60px; }

.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.4s;
}
.overlay.active { opacity: 1; pointer-events: auto; }

.overlay h2 {
  font-size: 52px; margin-bottom: 12px;
  background: linear-gradient(90deg, #f7971e, #ffd200, #ff4757, #ffd200, #f7971e);
  background-size: 200% 100%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 1.5s ease-in-out infinite;
}

@keyframes shimmer {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.overlay p { font-size: 16px; margin-bottom: 20px; opacity: 0.8; }

.overlay .btn {
  font-size: 17px; padding: 10px 28px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #000; font-weight: bold;
}

.particle {
  position: fixed; pointer-events: none;
  border-radius: 50%; z-index: 250;
}

#start-screen {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 300; transition: opacity 0.5s;
}

#start-screen h1 {
  font-size: 38px; margin-bottom: 8px;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

#start-screen p { opacity: 0.6; margin-bottom: 28px; font-size: 15px; }

#start-screen .btn {
  font-size: 20px; padding: 12px 40px;
  background: linear-gradient(135deg, #f7971e, #ffd200);
  color: #000; font-weight: bold;
}

.gem-preview { display: flex; gap: 10px; margin: 16px 0; }
.gem-preview canvas { width: 36px; height: 36px; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>宝石分类</h1>
  <p>把宝石按颜色或形状分入瓶子</p>
  <div class="gem-preview" id="gem-preview"></div>
  <button class="btn" onclick="startGame()">开始游戏</button>
</div>

<div id="game-container">
  <div id="top-bar">
    <h1>宝石分类</h1>
    <span id="level-info">第 1 关</span>
    <button class="btn" onclick="restartLevel()">重新开始</button>
  </div>
  <div id="gem-area">
    <canvas id="gem-canvas"></canvas>
  </div>
  <div id="bottle-area"></div>
</div>

<div id="drag-gem">
  <canvas id="drag-canvas" width="60" height="60"></canvas>
</div>

<div class="overlay" id="win-overlay">
  <h2>WIN!</h2>
  <p id="win-text">恭喜通关！</p>
  <button class="btn" onclick="nextLevel()">下一关</button>
</div>

<div class="overlay" id="lose-overlay">
  <h2 style="background:linear-gradient(90deg,#ff4757,#ff6b81);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-size:42px;">失败了...</h2>
  <p>没有可以放入瓶子的宝石了</p>
  <button class="btn" onclick="restartLevel()">再来一次</button>
</div>

<script>
// ============ Constants ============
const COLORS = [
  { name: '红', hex: '#ff4757', glow: '#ff6b81' },
  { name: '蓝', hex: '#3742fa', glow: '#5352ed' },
  { name: '绿', hex: '#2ed573', glow: '#7bed9f' },
  { name: '紫', hex: '#a55eea', glow: '#d4a3ff' },
  { name: '橙', hex: '#ff9f43', glow: '#ffc87c' },
];

const SHAPES = [
  { name: '星形', draw: drawStar },
  { name: '圆形', draw: drawCircle },
  { name: '方形', draw: drawSquare },
  { name: '三角形', draw: drawTriangle },
  { name: '菱形', draw: drawDiamond },
];

const GEM_RADIUS = 18;
const GRAVITY = 0.4;
const DAMPING = 0.55;
// BOTTLE_GEM_R is computed per bottle in Bottle constructor

// ============ Shape Drawers ============
function drawStar(ctx, x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = r > 8 ? 10 : 4;
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = (i * Math.PI) / 5 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.42;
    const nx = x + rad * Math.cos(angle);
    const ny = y + rad * Math.sin(angle);
    i === 0 ? ctx.moveTo(nx, ny) : ctx.lineTo(nx, ny);
  }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = r > 8 ? 1.2 : 0.6; ctx.stroke();
  ctx.beginPath(); ctx.arc(x - r * 0.15, y - r * 0.15, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
  ctx.restore();
}

function drawCircle(ctx, x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = r > 8 ? 12 : 4;
  const grad = ctx.createRadialGradient(x - r*0.25, y - r*0.25, r*0.05, x, y, r*0.85);
  grad.addColorStop(0, '#fff'); grad.addColorStop(0.15, glow); grad.addColorStop(1, color);
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r * 0.85, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = r > 8 ? 1.2 : 0.5; ctx.stroke();
  ctx.restore();
}

function drawSquare(ctx, x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = r > 8 ? 8 : 3;
  const s = r * 0.72;
  ctx.fillStyle = color;
  ctx.translate(x, y); ctx.rotate(Math.PI / 12);
  ctx.beginPath(); ctx.roundRect(-s, -s, s*2, s*2, r > 8 ? 3 : 1); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = r > 8 ? 1 : 0.5; ctx.stroke();
  ctx.restore();
}

function drawTriangle(ctx, x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = r > 8 ? 10 : 3;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r * 0.9, y + r * 0.7); ctx.lineTo(x - r * 0.9, y + r * 0.7);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = r > 8 ? 1.2 : 0.5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - r*0.15, y - r*0.3); ctx.lineTo(x + r*0.2, y + r*0.1); ctx.lineTo(x - r*0.3, y + r*0.1);
  ctx.closePath(); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
  ctx.restore();
}

function drawDiamond(ctx, x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow; ctx.shadowBlur = r > 8 ? 8 : 3;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r*0.65, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r*0.65, y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = r > 8 ? 1 : 0.5; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y - r*0.5); ctx.lineTo(x + r*0.3, y); ctx.lineTo(x, y + r*0.5); ctx.lineTo(x - r*0.3, y);
  ctx.closePath(); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
  ctx.restore();
}

// ============ Gem Class ============
class Gem {
  constructor(x, y, colorIdx, shapeIdx) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.colorIdx = colorIdx; this.shapeIdx = shapeIdx;
    this.r = GEM_RADIUS;
    this.dragging = false; this.removed = false;
    this.angle = (Math.random() - 0.5) * Math.PI * 0.5;
    this.angularVel = (Math.random() - 0.5) * 0.08;
  }
  get hex() { return COLORS[this.colorIdx].hex; }
  get glow() { return COLORS[this.colorIdx].glow; }

  draw(ctx) {
    if (this.removed || this.dragging) return;
    ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
    SHAPES[this.shapeIdx].draw(ctx, 0, 0, this.r, this.hex, this.glow);
    ctx.restore();
  }
  drawAt(ctx, x, y, size) {
    ctx.save(); ctx.translate(x, y); ctx.rotate(this.angle);
    SHAPES[this.shapeIdx].draw(ctx, 0, 0, size || this.r, this.hex, this.glow);
    ctx.restore();
  }
}

// ============ Bottle Class ============
class Bottle {
  constructor(idx, capacity) {
    this.idx = idx;
    this.gems = []; // logical gem list
    this.physGems = []; // { colorIdx, shapeIdx, x, y, vy, r }
    this.dimension = null;
    this.dimensionValue = null;
    this.capacity = capacity;
    this.gemR = 5; // computed in calcGemR()
    // DOM refs (set during createBottleDOM)
    this.el = null; this.labelEl = null; this.countEl = null;
    this.canvasEl = null; this.canvasCtx = null;
    this.bodyW = 0; this.bodyH = 0;
  }

  // Calculate gem radius so that capacity gems fill the bottle
  calcGemR() {
    const W = this.bodyW;
    const H = this.bodyH;
    const n = this.capacity;
    // How many columns fit? Try radius, see if cols * rows >= n
    // Area approach: n * pi*r^2 * packingFactor ~ W * H
    // packing ~ 0.7 for random circle packing
    const area = W * H;
    const r = Math.sqrt(area / (n * Math.PI * 0.78));
    // Clamp: at least 3, at most W/3
    this.gemR = Math.max(3, Math.min(Math.floor(r), W / 3));
  }
  get count() { return this.gems.length; }
  get isFull() { return this.count >= this.capacity; }

  canAccept(gem) {
    if (this.isFull) return false;
    if (this.count === 0) return true;
    if (this.dimension === 'color') return gem.colorIdx === this.dimensionValue;
    if (this.dimension === 'shape') return gem.shapeIdx === this.dimensionValue;
    const ref = this.gems[0];
    return gem.colorIdx === ref.colorIdx || gem.shapeIdx === ref.shapeIdx;
  }

  add(gem) {
    this.gems.push({ colorIdx: gem.colorIdx, shapeIdx: gem.shapeIdx });
    const R = this.gemR;
    this.physGems.push({
      colorIdx: gem.colorIdx, shapeIdx: gem.shapeIdx,
      x: this.bodyW / 2 + (Math.random() - 0.5) * (this.bodyW * 0.3),
      y: R, vy: 0, r: R
    });
    // Dimension lock check
    if (!this.dimension && this.count >= 2) {
      const ref = this.gems[0];
      const allSameColor = this.gems.every(g => g.colorIdx === ref.colorIdx);
      const allSameShape = this.gems.every(g => g.shapeIdx === ref.shapeIdx);
      if (allSameColor && !allSameShape) { this.dimension = 'color'; this.dimensionValue = ref.colorIdx; }
      else if (allSameShape && !allSameColor) { this.dimension = 'shape'; this.dimensionValue = ref.shapeIdx; }
    }
    this.updateInfo();
  }

  updateInfo() {
    if (!this.el) return;
    this.labelEl.textContent = this.getLabel();
    this.countEl.textContent = `${this.count}/${this.capacity}`;
    this.el.classList.toggle('full', this.isFull);
  }

  getLabel() {
    if (!this.dimension) return '';
    if (this.dimension === 'color') return COLORS[this.dimensionValue].name;
    return SHAPES[this.dimensionValue].name;
  }

  updatePhysics() {
    const W = this.bodyW, H = this.bodyH, G = 0.5;
    for (const g of this.physGems) {
      const r = g.r;
      g.vy += G;
      g.y += g.vy;
      if (g.y + r > H) { g.y = H - r; g.vy = -Math.abs(g.vy) * 0.35; if (Math.abs(g.vy) < 0.6) g.vy = 0; }
      if (g.x - r < 0) g.x = r;
      if (g.x + r > W) g.x = W - r;
    }
    for (let i = 0; i < this.physGems.length; i++) {
      for (let j = i + 1; j < this.physGems.length; j++) {
        const a = this.physGems[i], b = this.physGems[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx*dx + dy*dy, minD = a.r + b.r;
        if (distSq < minD * minD && distSq > 0.01) {
          const dist = Math.sqrt(distSq), nx = dx/dist, ny = dy/dist, overlap = minD - dist;
          a.x -= nx*overlap*0.5; a.y -= ny*overlap*0.5;
          b.x += nx*overlap*0.5; b.y += ny*overlap*0.5;
          const relDot = (a.vy - b.vy) * ny;
          if (relDot > 0) { a.vy -= ny*relDot*0.4; b.vy += ny*relDot*0.4; }
        }
      }
    }
    for (const g of this.physGems) {
      const r = g.r;
      if (g.y + r > H) g.y = H - r;
      if (g.y - r < 0) g.y = r;
      if (g.x - r < 0) g.x = r;
      if (g.x + r > W) g.x = W - r;
    }
  }

  drawGems() {
    if (!this.canvasCtx) return;
    const ctx = this.canvasCtx;
    ctx.clearRect(0, 0, this.bodyW, this.bodyH);
    for (const g of this.physGems) {
      SHAPES[g.shapeIdx].draw(ctx, g.x, g.y, g.r, COLORS[g.colorIdx].hex, COLORS[g.colorIdx].glow);
    }
  }
}

// ============ Level Configs ============
const LEVELS = [
  { colors: 2, shapes: 1, bottles: 2, gemsPerBottle: 6,  extraPerColor: 3 },
  { colors: 2, shapes: 2, bottles: 3, gemsPerBottle: 6,  extraPerColor: 3 },
  { colors: 3, shapes: 2, bottles: 3, gemsPerBottle: 8,  extraPerColor: 4 },
  { colors: 3, shapes: 3, bottles: 4, gemsPerBottle: 8,  extraPerColor: 4 },
  { colors: 4, shapes: 3, bottles: 4, gemsPerBottle: 10, extraPerColor: 5 },
  { colors: 4, shapes: 4, bottles: 5, gemsPerBottle: 10, extraPerColor: 5 },
  { colors: 5, shapes: 4, bottles: 5, gemsPerBottle: 12, extraPerColor: 5 },
  { colors: 5, shapes: 5, bottles: 6, gemsPerBottle: 12, extraPerColor: 6 },
];

// ============ Game State ============
let canvas, ctx, dragCanvas, dragCtx;
let canvasW, canvasH;
let gems = [], bottles = [];
let currentLevel = 0;
let draggingGem = null, mouseX = 0, mouseY = 0;
let animationId, gameRunning = false;
let spawnQueue = [], spawnTimer = 0;

// ============ Sizing ============
function getBottleSize() {
  const vw = Math.min(window.innerWidth, 500);
  const count = bottles.length || 3;
  const maxW = Math.floor((vw - 16 - (count - 1) * 10) / count);
  const w = Math.max(Math.min(maxW, 80), 50);
  return { w, bodyW: w - 6, bodyH: Math.round((w - 6) * 2), neckW: Math.round(w * 0.48), neckH: Math.round(w * 0.2) };
}

// ============ Init ============
function initCanvas() {
  canvas = document.getElementById('gem-canvas');
  ctx = canvas.getContext('2d');
  dragCanvas = document.getElementById('drag-canvas');
  dragCtx = dragCanvas.getContext('2d');
  resizeCanvas();
}

function resizeCanvas() {
  const area = document.getElementById('gem-area');
  const dpr = devicePixelRatio;
  canvas.width = area.clientWidth * dpr;
  canvas.height = area.clientHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  canvasW = area.clientWidth;
  canvasH = area.clientHeight;
}

function initLevel(levelIdx) {
  if (levelIdx >= LEVELS.length) levelIdx = LEVELS.length - 1;
  currentLevel = levelIdx;
  const cfg = LEVELS[levelIdx];

  bottles = [];
  for (let i = 0; i < cfg.bottles; i++) bottles.push(new Bottle(i, cfg.gemsPerBottle));

  gems = []; spawnQueue = [];
  const bottleTotal = cfg.bottles * cfg.gemsPerBottle;
  const basePerColor = Math.ceil(bottleTotal / cfg.colors);
  const gemList = [];
  for (let c = 0; c < cfg.colors; c++) {
    const count = basePerColor + cfg.extraPerColor;
    for (let j = 0; j < count; j++) {
      gemList.push({ colorIdx: c, shapeIdx: Math.floor(Math.random() * cfg.shapes) });
    }
  }
  for (let i = gemList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [gemList[i], gemList[j]] = [gemList[j], gemList[i]];
  }
  spawnQueue = gemList; spawnTimer = 0;

  document.getElementById('level-info').textContent = `第 ${levelIdx + 1} 关`;
  createBottleDOM();
}

// ============ Bottle DOM ============
function createBottleDOM() {
  const area = document.getElementById('bottle-area');
  area.innerHTML = '';
  const sz = getBottleSize();

  bottles.forEach((bottle) => {
    bottle.bodyW = sz.bodyW; bottle.bodyH = sz.bodyH;
    bottle.calcGemR();

    const div = document.createElement('div');
    div.className = 'bottle';
    div.style.width = sz.w + 'px';

    const label = document.createElement('div');
    label.className = 'bottle-label';

    const neck = document.createElement('div');
    neck.className = 'bottle-neck';
    neck.style.width = sz.neckW + 'px'; neck.style.height = sz.neckH + 'px';

    const body = document.createElement('div');
    body.className = 'bottle-body';
    body.style.width = sz.bodyW + 'px'; body.style.height = sz.bodyH + 'px';

    const miniCanvas = document.createElement('canvas');
    miniCanvas.className = 'bottle-gem-canvas';
    miniCanvas.width = sz.bodyW; miniCanvas.height = sz.bodyH;
    body.appendChild(miniCanvas);

    const fullMark = document.createElement('div');
    fullMark.className = 'bottle-full-mark';
    fullMark.textContent = '\u2714';
    body.appendChild(fullMark);

    const count = document.createElement('div');
    count.className = 'bottle-count';
    count.textContent = `0/${bottle.capacity}`;

    div.appendChild(label); div.appendChild(neck);
    div.appendChild(body); div.appendChild(count);
    area.appendChild(div);

    bottle.el = div; bottle.labelEl = label; bottle.countEl = count;
    bottle.canvasEl = miniCanvas; bottle.canvasCtx = miniCanvas.getContext('2d');
  });
}

function updateBottleHighlight(idx) {
  bottles.forEach((b, i) => {
    if (b.el) b.el.classList.toggle('highlight', i === idx);
  });
}

// ============ Spawn ============
function spawnNextGem() {
  if (spawnQueue.length === 0) return;
  const data = spawnQueue.pop();
  const spread = canvasW * 0.35;
  const x = canvasW / 2 + (Math.random() - 0.5) * spread;
  const y = -GEM_RADIUS - Math.random() * 20;
  const gem = new Gem(x, y, data.colorIdx, data.shapeIdx);
  gem.vx = (Math.random() - 0.5) * 2;
  gems.push(gem);
}

// ============ Wake Nearby Gems ============
function wakeNearby(source) {
  for (const gem of gems) {
    if (gem === source || gem.removed || gem.dragging) continue;
    const dx = gem.x - source.x;
    const dy = gem.y - source.y;
    if (dx*dx + dy*dy < (gem.r * 4) * (gem.r * 4)) {
      // Give a tiny nudge so physics re-engages
      gem.vy += -0.5;
      gem.vx += (Math.random() - 0.5) * 0.5;
    }
  }
}

// ============ Mountain Physics ============
function clampBounds(gem) {
  if (gem.x - gem.r < 0) { gem.x = gem.r; gem.vx = Math.abs(gem.vx) * 0.3; }
  if (gem.x + gem.r > canvasW) { gem.x = canvasW - gem.r; gem.vx = -Math.abs(gem.vx) * 0.3; }
  if (gem.y + gem.r > canvasH) {
    gem.y = canvasH - gem.r;
    gem.vy = -Math.abs(gem.vy) * DAMPING;
    if (Math.abs(gem.vy) < 0.8) gem.vy = 0;
    gem.vx *= 0.85;
  }
}

function updateMountainPhysics() {
  spawnTimer++;
  if (spawnTimer % 3 === 0 && spawnQueue.length > 0) spawnNextGem();

  for (const gem of gems) {
    if (gem.removed || gem.dragging) continue;
    // Always apply gravity
    gem.vy += GRAVITY;
    gem.vx *= 0.992;
    gem.x += gem.vx;
    gem.y += gem.vy;
    // Rotation
    gem.angularVel += gem.vx * 0.005;
    gem.angularVel *= 0.92;
    gem.angle += gem.angularVel;
    clampBounds(gem);
  }

  // Collisions (3 passes)
  const active = gems.filter(g => !g.removed && !g.dragging);
  for (let iter = 0; iter < 3; iter++) {
    for (let i = 0; i < active.length; i++) {
      for (let j = i + 1; j < active.length; j++) {
        const a = active[i], b = active[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const distSq = dx*dx + dy*dy;
        const minDist = a.r + b.r;
        if (distSq < minDist * minDist && distSq > 0.01) {
          const dist = Math.sqrt(distSq);
          const nx = dx / dist, ny = dy / dist;
          const overlap = minDist - dist;
          a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
          b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;
          const relVn = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
          if (relVn > 0) {
            const imp = relVn * DAMPING;
            a.vx -= nx * imp; a.vy -= ny * imp;
            b.vx += nx * imp; b.vy += ny * imp;
          }
        }
      }
    }
  }
  for (const gem of active) clampBounds(gem);
}

// ============ Render Mountain ============
function renderMountain() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  const remaining = gems.filter(g => !g.removed).length;
  ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '13px system-ui'; ctx.textAlign = 'center';
  if (spawnQueue.length > 0) ctx.fillText(`掉落中... ${spawnQueue.length + remaining} 颗`, canvasW/2, 20);
  else if (remaining > 0) ctx.fillText(`剩余 ${remaining} 颗`, canvasW/2, 20);
  ctx.restore();

  const visible = gems.filter(g => !g.removed && !g.dragging).sort((a, b) => a.y - b.y);
  for (const gem of visible) gem.draw(ctx);
}

// ============ Gem Picking ============
function findGemAt(px, py) {
  // Find the gem closest to the tap point within a generous radius
  const maxDistSq = (GEM_RADIUS * 2.5) * (GEM_RADIUS * 2.5);
  let best = null, bestDist = maxDistSq;
  for (const gem of gems) {
    if (gem.removed || gem.dragging) continue;
    const dx = px - gem.x, dy = py - gem.y;
    const distSq = dx * dx + dy * dy;
    if (distSq < bestDist) {
      best = gem; bestDist = distSq;
    }
  }
  return best;
}

// ============ Drag & Drop ============
function getCanvasPos(cx, cy) {
  const r = canvas.getBoundingClientRect();
  return { x: cx - r.left, y: cy - r.top };
}

function findBottleAt(cx, cy) {
  for (let i = 0; i < bottles.length; i++) {
    const el = bottles[i].el; if (!el) continue;
    const r = el.getBoundingClientRect();
    if (cx >= r.left - 10 && cx <= r.right + 10 && cy >= r.top - 15 && cy <= r.bottom + 10) return i;
  }
  return -1;
}

function onPointerDown(e) {
  if (!gameRunning) return;
  e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pos = getCanvasPos(cx, cy);
  const gem = findGemAt(pos.x, pos.y);
  if (gem) {
    draggingGem = gem; gem.dragging = true;
    mouseX = cx; mouseY = cy;
    wakeNearby(gem);
    const dragEl = document.getElementById('drag-gem');
    dragEl.style.display = 'block';
    dragCtx.clearRect(0, 0, 60, 60);
    gem.drawAt(dragCtx, 30, 30, 22);
    dragEl.style.left = (cx - 30) + 'px'; dragEl.style.top = (cy - 30) + 'px';
  }
}

function onPointerMove(e) {
  if (!draggingGem) return;
  e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  mouseX = cx; mouseY = cy;
  const dragEl = document.getElementById('drag-gem');
  dragEl.style.left = (cx - 30) + 'px'; dragEl.style.top = (cy - 30) + 'px';
  updateBottleHighlight(findBottleAt(cx, cy));
}

function onPointerUp(e) {
  if (!draggingGem) return;
  e.preventDefault();
  const cx = e.changedTouches ? e.changedTouches[0].clientX : mouseX;
  const cy = e.changedTouches ? e.changedTouches[0].clientY : mouseY;
  const bi = findBottleAt(cx, cy);

  if (bi >= 0 && bottles[bi].canAccept(draggingGem)) {
    const gem = draggingGem;
    gem.removed = true;
    wakeNearby(gem);
    // Directly drop into bottle — physics gem falls from neck
    const bEl = bottles[bi].el;
    const bRect = bEl.getBoundingClientRect();
    spawnBottleSparkle(bRect.left + bRect.width / 2, bRect.top + 20, gem.hex);
    bottles[bi].add(gem);
    bEl.animate([
      { transform: 'scale(1)' }, { transform: 'scale(1.06)' }, { transform: 'scale(1)' }
    ], { duration: 200 });
    checkWin();
  } else if (bi >= 0) {
    const bEl = bottles[bi].el;
    if (bEl) { bEl.classList.add('reject'); setTimeout(() => bEl.classList.remove('reject'), 300); }
    draggingGem.dragging = false;
  } else {
    draggingGem.dragging = false;
  }
  draggingGem = null;
  updateBottleHighlight(-1);
  document.getElementById('drag-gem').style.display = 'none';
}

// ============ Win / Lose ============
function checkWin() {
  if (bottles.every(b => b.isFull)) {
    setTimeout(() => { gameRunning = false; showWin(); }, 400);
    return;
  }
  // Check dead-lock after a short delay (let spawn finish)
  if (spawnQueue.length === 0) {
    setTimeout(checkDeadLock, 300);
  }
}

function checkDeadLock() {
  if (!gameRunning) return;
  // Are there remaining gems in the mountain?
  const remaining = gems.filter(g => !g.removed && !g.dragging);
  if (remaining.length === 0) return; // no gems left, might already be won
  // Is there any bottle that's not full?
  const openBottles = bottles.filter(b => !b.isFull);
  if (openBottles.length === 0) return; // all full = win
  // Can ANY remaining gem go into ANY open bottle?
  for (const gem of remaining) {
    for (const bottle of openBottles) {
      if (bottle.canAccept(gem)) return; // at least one valid move exists
    }
  }
  // No valid moves — dead lock!
  setTimeout(() => { gameRunning = false; showLose(); }, 200);
}

function showLose() {
  document.getElementById('lose-overlay').classList.add('active');
}

function showWin() {
  const screenCX = window.innerWidth / 2;
  const screenCY = window.innerHeight / 2;
  const n = bottles.length;
  const clones = [];

  bottles.forEach((bottle, idx) => {
    const el = bottle.el;
    const rect = el.getBoundingClientRect();
    const clone = el.cloneNode(true);
    // cloneNode doesn't copy canvas content — redraw gems onto the clone's canvas
    const srcCanvas = bottle.canvasEl;
    const cloneCanvas = clone.querySelector('.bottle-gem-canvas');
    if (srcCanvas && cloneCanvas) {
      cloneCanvas.width = srcCanvas.width; cloneCanvas.height = srcCanvas.height;
      cloneCanvas.getContext('2d').drawImage(srcCanvas, 0, 0);
    }
    clone.style.cssText = `position:fixed;z-index:210;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;transition:none;display:flex;flex-direction:column;align-items:center;`;
    document.body.appendChild(clone); clones.push(clone);
    el.style.opacity = '0';

    // Spacing based on actual bottle width, scale factor, and screen width
    const scale = 1.3;
    const gap = 10;
    const scaledW = rect.width * scale;
    const totalW = n * scaledW + (n - 1) * gap;
    const startX = screenCX - totalW / 2;
    const targetX = startX + idx * (scaledW + gap) + (scaledW - rect.width) / 2;
    const targetY = screenCY - rect.height * scale / 2;

    setTimeout(() => {
      clone.animate([
        { left: rect.left+'px', top: rect.top+'px', transform: 'scale(1)' },
        { left: targetX+'px', top: targetY+'px', transform: `scale(${scale})` }
      ], { duration: 600, easing: 'cubic-bezier(0.2,0.8,0.2,1)', fill: 'forwards' }).onfinish = () => {
        spawnFirework(targetX + rect.width/2, targetY + rect.height * scale / 2);
        clone.animate([
          { transform: `scale(${scale})` },
          { transform: `scale(${scale * 1.1})` },
          { transform: `scale(${scale})` }
        ], { duration: 250 });
      };
    }, idx * 100);
  });

  const arrive = n * 100 + 600;
  setTimeout(() => spawnConfetti(), arrive + 150);
  setTimeout(() => {
    clones.forEach(c => c.remove());
    bottles.forEach(b => { if (b.el) b.el.style.opacity = '1'; });
    document.getElementById('win-overlay').classList.add('active');
    document.getElementById('win-text').textContent =
      currentLevel >= LEVELS.length - 1 ? '恭喜通过所有关卡！' : '恭喜通关！';
  }, arrive + 1600);
}

function hideWin() {
  document.getElementById('win-overlay').classList.remove('active');
  document.getElementById('lose-overlay').classList.remove('active');
}

// ============ Effects ============
function spawnBottleSparkle(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle'; p.style.background = color;
    p.style.left = x+'px'; p.style.top = y+'px';
    const s = 3+Math.random()*4; p.style.width=s+'px'; p.style.height=s+'px';
    document.body.appendChild(p);
    const a = (Math.PI*2*i)/10+Math.random()*0.5, d = 15+Math.random()*25;
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`, opacity: 0 }
    ], { duration: 300, easing: 'ease-out' }).onfinish = () => p.remove();
  }
}

function spawnFirework(cx, cy) {
  const cs = ['#f7971e','#ffd200','#ff4757','#2ed573','#3742fa','#a55eea','#fff'];
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.style.background = cs[Math.floor(Math.random()*cs.length)];
    p.style.left = cx+'px'; p.style.top = cy+'px';
    const s = 4+Math.random()*8; p.style.width=s+'px'; p.style.height=s+'px';
    document.body.appendChild(p);
    const a = Math.random()*Math.PI*2, d = 40+Math.random()*100;
    p.animate([
      { transform: 'translate(0,0) scale(1.3)', opacity: 1 },
      { transform: `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`, opacity: 0 }
    ], { duration: 400+Math.random()*400, easing: 'cubic-bezier(0,.8,.3,1)' }).onfinish = () => p.remove();
  }
}

function spawnConfetti() {
  const cs = ['#f7971e','#ffd200','#ff4757','#2ed573','#3742fa','#a55eea','#ff6b81','#7bed9f'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div'); p.className = 'particle';
      p.style.background = cs[Math.floor(Math.random()*cs.length)];
      p.style.left = Math.random()*window.innerWidth+'px'; p.style.top = '-10px';
      const w = 4+Math.random()*7; p.style.width=w+'px'; p.style.height = w*(0.5+Math.random())+'px';
      p.style.borderRadius = Math.random()>0.5?'50%':'2px';
      document.body.appendChild(p);
      const drift = (Math.random()-0.5)*180, rot = (Math.random()-0.5)*900;
      p.animate([
        { transform: `translate(0,0) rotate(0deg)`, opacity: 1 },
        { transform: `translate(${drift}px,${window.innerHeight+20}px) rotate(${rot}deg)`, opacity: 0.4 }
      ], { duration: 1800+Math.random()*1800, easing: 'ease-in' }).onfinish = () => p.remove();
    }, Math.random() * 1200);
  }
}

// ============ Game Loop ============
function gameLoop() {
  if (gameRunning) {
    updateMountainPhysics();
    renderMountain();
    for (const b of bottles) { b.updatePhysics(); b.drawGems(); }
  }
  animationId = requestAnimationFrame(gameLoop);
}

// ============ Controls ============
function startGame() {
  document.getElementById('start-screen').style.opacity = '0';
  setTimeout(() => document.getElementById('start-screen').style.display = 'none', 500);
  initCanvas(); initLevel(0); gameRunning = true; gameLoop();
}

function restartLevel() { hideWin(); gems = []; initLevel(currentLevel); gameRunning = true; }
function nextLevel() { hideWin(); gems = []; initLevel(currentLevel + 1); gameRunning = true; }

// ============ Events ============
window.addEventListener('resize', () => { if (canvas) resizeCanvas(); });
document.addEventListener('mousedown', onPointerDown);
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('mouseup', onPointerUp);
document.addEventListener('touchstart', onPointerDown, { passive: false });
document.addEventListener('touchmove', onPointerMove, { passive: false });
document.addEventListener('touchend', onPointerUp, { passive: false });

// ============ Preview ============
(function() {
  const c = document.getElementById('gem-preview');
  for (let i = 0; i < 5; i++) {
    const cv = document.createElement('canvas'); cv.width = 36; cv.height = 36;
    SHAPES[i].draw(cv.getContext('2d'), 18, 18, 12, COLORS[i].hex, COLORS[i].glow);
    c.appendChild(cv);
  }
})();
</script>
